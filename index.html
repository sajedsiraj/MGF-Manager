// Payroll tab
function getRange(period) {
  const t=new Date();
  if (period==='week') return getWeekDates(0).map(fmtDs);
  if (period==='fortnight') return [...getWeekDates(0).map(fmtDs),...getWeekDates(-1).map(fmtDs)];
  const dates=[], d=new Date(t.getFullYear(),t.getMonth(),1);
  while(d.getMonth()===t.getMonth()){dates.push(fmtDs(d));d.setDate(d.getDate()+1);}
  return dates;
}
function PayrollTab({ workers, shifts }) {
  const [period, setPeriod] = useState('fortnight');
  const calc = (w) => {
    const dates=getRange(period);
    const h=dates.reduce((s,date)=>{const sh=shifts.docs.find(x=>x.workerId===w.id&&x.date===date);return s+(sh?hw(sh.start,sh.end):0);},0);
    return {hours:parseFloat(h.toFixed(2)),pay:parseFloat((h*w.rate).toFixed(2))};
  };
  const groupA = workers.docs.filter(w=>(w.payGroup||'A')==='A');
  const groupB = workers.docs.filter(w=>w.payGroup==='B');
  const totalA = groupA.reduce((s,w)=>s+calc(w).pay,0);
  const totalB = groupB.reduce((s,w)=>s+calc(w).pay,0);
  const total = totalA + totalB;

  // Pay schedule summary per group
  function groupPayStatus(group) {
    // Find the most common next pay date / days until across group
    const infos = group.map(w => getPayInfo(w, shifts.docs));
    const withPay = infos.filter(i => i.daysUntil != null);
    if (!withPay.length) return null;
    const minDays = Math.min(...withPay.map(i => i.daysUntil));
    const maxSince = Math.max(...infos.filter(i=>i.daysSince!=null).map(i=>i.daysSince));
    return { daysUntil: minDays, daysSince: maxSince };
  }

  const renderGroup = (group, label, groupTotal) => {
    const ps = groupPayStatus(group);
    const urgColor = ps && ps.daysUntil===0?'#cc3222': ps && ps.daysUntil<=2?'#e07030':'#C8873A';
    const overdue = ps && ps.daysSince > 14;
    return (
    <div style={{marginBottom:24}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,paddingBottom:8,borderBottom:'1px solid #1e1e1e'}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'#555'}}>{label}</div>
        <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'#C8873A',fontSize:15}}>{fmtMoney(groupTotal)}</div>
      </div>

      {/* Pay schedule pills */}
      {ps && (
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <div style={{background: overdue?'#2a0a0a':'#1a1200', border:'1px solid '+(overdue?'#5a1010':'#5a4000'), borderRadius:20, padding:'4px 12px', display:'flex', alignItems:'center', gap:6}}>
            <span style={{fontSize:10,color:'#555'}}>Since last pay</span>
            <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:12,color:overdue?'#cc3222':'#f0ebe4'}}>{ps.daysSince != null ? ps.daysSince+'d' : '—'}</span>
            {overdue && <span style={{fontSize:10,color:'#cc3222',fontWeight:700}}>OVERDUE</span>}
          </div>
          <div style={{background:'#111a0a', border:'1px solid #3a5020', borderRadius:20, padding:'4px 12px', display:'flex', alignItems:'center', gap:6}}>
            <span style={{fontSize:10,color:'#555'}}>Next pay</span>
            <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:12,color:urgColor}}>
              {ps.daysUntil===0?'TODAY':ps.daysUntil===1?'TOMORROW':ps.daysUntil+'d'}
            </span>
          </div>
        </div>
      )}

      {group.map(w=>{
        const {hours,pay}=calc(w);
        const {daysSince, daysUntil} = getPayInfo(w, shifts.docs);
        const wOverdue = daysSince != null && daysSince > 14;
        return (
          <div key={w.id} style={{...SC,padding:14}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:w.color}}/>
              <div style={{fontWeight:600,flex:1}}>{w.name}</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {daysUntil!=null && (
                  <span style={{fontSize:10,fontFamily:'DM Mono,monospace',color:daysUntil<=2?'#e07030':'#555',background:'#1e1e1e',padding:'2px 7px',borderRadius:20}}>
                    {daysUntil===0?'PAY TODAY':daysUntil===1?'TMR':'in '+daysUntil+'d'}
                  </span>
                )}
                {wOverdue && <span style={{fontSize:10,color:'#cc3222',fontWeight:700,background:'#1e0505',padding:'2px 7px',borderRadius:20}}>OVERDUE</span>}
                <div style={{fontSize:11,color:'#555'}}>{w.role}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:20}}>
              <Kpi label="Rate" val={'$'+w.rate+'/hr'}/>
              <Kpi label="Hours" val={hours>0?hours+'h':'—'}/>
              <Kpi label="Pay" val={pay>0?fmtMoney(pay):'—'}/>
              {daysSince!=null && <Kpi label="Days since paid" val={daysSince+'d'} warn={wOverdue}/>}
            </div>
          </div>
        );
      })}
    </div>
  );};

  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:20}}>
        {[['week','Week'],['fortnight','Fortnight'],['month','Month']].map(([v,l])=>(
          <button key={v} onClick={()=>setPeriod(v)} style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,background:period===v?'#C8873A':'#161616',color:period===v?'#fff':'#777',letterSpacing:0.2}}>{l}</button>
        ))}
      </div>
      {workers.docs.length===0?<Empty msg="No staff yet"/>:(
        <>
          {groupA.length>0&&renderGroup(groupA,'Group A',totalA)}
          {groupB.length>0&&renderGroup(groupB,'Group B',totalB)}
          <div style={{background:'#C8873A',borderRadius:10,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
            <div style={{fontWeight:700,fontSize:14}}>Total</div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:24}}>{fmtMoney(total)}</div>
          </div>
        </>
      )}
    </div>
  );
}

// Import tab
function ImportTab({ workers, shifts }) {
  const [status, setStatus] = useState(null);
  const [preview, setPreview] = useState([]);
  const [result, setResult] = useState(null);
  const fileRef = useRef();
  const handleFile = async (e) => {
    const file=e.target.files[0]; if(!file) return;
    setStatus('loading');
    try {
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const out=[];
      wb.SheetNames.slice(1).forEach(sn=>{
        const ws=wb.Sheets[sn];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        const name=rows[1]&&rows[1][1]?String(rows[1][1]).trim():null;
        if(!name) return;
        let rate=0; const shs=[];
        for(let i=4;i<rows.length;i++){
          const r=rows[i];
          if(!r||r[2]===null) continue;
          if(typeof r[2]==='string'&&r[2].toLowerCase().includes('total')) break;
          if(typeof r[2]!=='number'||typeof r[3]!=='number') continue;
          if(r[5]&&r[5]>0) rate=r[5];
          shs.push({date:excelDate(r[2]),start:excelTime(r[2]),end:excelTime(r[3])});
        }
        if(shs.length>0) out.push({name,rate,shifts:shs});
      });
      const enriched=out.map(p=>{
        const match=workers.docs.find(w=>w.name.trim().toLowerCase()===p.name.trim().toLowerCase());
        return {...p,workerId:match?.id||null,workerColor:match?.color||'#666',matched:!!match};
      }).filter(p=>p.shifts.length>0);
      setPreview(enriched); setStatus('preview');
    } catch(err){ setStatus('error'); }
  };
  const doImport = async () => {
    setStatus('loading'); let imp=0,skp=0;
    for(const p of preview){
      if(!p.workerId){skp+=p.shifts.length;continue;}
      for(const s of p.shifts){
        const id=p.workerId+'_'+s.date;
        if(shifts.docs.find(x=>x.id===id)){skp++;continue;}
        await shifts.set(id,{workerId:p.workerId,date:s.date,start:s.start,end:s.end,source:'timesquared'});
        imp++;
      }
    }
    setResult({imported:imp,skipped:skp}); setStatus('done');
    if(fileRef.current) fileRef.current.value='';
  };
  const reset=()=>{setStatus(null);setPreview([]);setResult(null);};
  const matched=preview.filter(p=>p.matched), unmatched=preview.filter(p=>!p.matched);
  return (
    <div>
      <div style={{...SC,padding:16,marginBottom:12}}>
        <div style={{fontSize:10,color:'#C8873A',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Import from TimeSquared</div>
        <div style={{fontSize:13,color:'#555',marginBottom:14}}>Export a Payroll Report (XLSX) from TimeSquared then upload here.</div>
        {(status===null||status==='error')&&(<>
          <label style={{...SB,display:'inline-block',cursor:'pointer'}}>Choose XLSX<input ref={fileRef} type="file" accept=".xlsx" onChange={handleFile} style={{display:'none'}}/></label>
          {status==='error'&&<div style={{color:'#cc3222',fontSize:12,marginTop:8}}>Couldn't read that file.</div>}
        </>)}
        {status==='loading'&&<div style={{color:'#555',fontSize:13}}>Reading...</div>}
        {status==='done'&&result&&(<div>
          <div style={{background:'#0d1f16',border:'1px solid #2d5a3f',borderRadius:8,padding:12,marginBottom:10}}>
            <div style={{color:'#3daa6e',fontWeight:700,marginBottom:2}}>Done</div>
            <div style={{fontSize:12,color:'#666'}}>{result.imported} shifts imported · {result.skipped} skipped</div>
          </div>
          <button onClick={reset} style={SG}>Import another</button>
        </div>)}
        {status==='preview'&&preview.length===0&&<div style={{color:'#555',fontSize:13}}>No shifts found.</div>}
        {status==='preview'&&preview.length>0&&(<div>
          {unmatched.length>0&&(<div style={{background:'#1a1200',border:'1px solid #5a4000',borderRadius:8,padding:10,marginBottom:12,fontSize:12}}>
            <div style={{color:'#C8873A',fontWeight:700,marginBottom:4}}>Unmatched workers (will skip):</div>
            {unmatched.map(p=><div key={p.name} style={{color:'#666'}}>{p.name} ({p.shifts.length} shifts)</div>)}
          </div>)}
          <div style={{maxHeight:240,overflowY:'auto',marginBottom:12}}>
            {matched.map(p=>(<div key={p.name} style={{marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:p.workerColor}}/>
                <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                <div style={{fontSize:10,color:'#3daa6e',marginLeft:'auto'}}>{p.shifts.length} shifts</div>
              </div>
              {p.shifts.map((s,i)=><div key={i} style={{display:'flex',gap:12,fontSize:11,color:'#444',paddingLeft:15,marginBottom:1}}><span style={{width:85}}>{s.date}</span><span>{s.start}–{s.end}</span></div>)}
            </div>))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={doImport} style={SB}>Import {matched.reduce((s,p)=>s+p.shifts.length,0)} shifts</button>
            <button onClick={reset} style={SG}>Cancel</button>
          </div>
        </div>)}
      </div>
      <div style={{...SC,padding:14}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>How to export from TimeSquared</div>
        {['Open TimeSquared → Reports','Select Payroll Report','Set date range','Export → XLSX','Upload here'].map((s,i)=>(
          <div key={i} style={{display:'flex',gap:10,marginBottom:5,fontSize:13,color:'#555'}}>
            <span style={{color:'#C8873A',fontWeight:700,width:16}}>{i+1}.</span><span>{s}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Stock list import
function StockImportButton({ suppliers }) {
  const [status, setStatus] = useState(null);
  const alreadyImported = suppliers.docs.some(s => s.fromStockSeed);

  const doImport = async () => {
    setStatus('importing');
    let count = 0;
    for (const [supName, items] of Object.entries(STOCK_SEED)) {
      const existing = suppliers.docs.find(s => s.name.toLowerCase() === supName.toLowerCase());
      const formattedItems = items.map((it, i) => ({
        id: 'seed_' + supName.replace(/\s+/g,'') + '_' + i,
        name: it.name, unit: it.unit, price: it.price,
        lowStock: it.lowStock, currentStock: it.currentStock
      }));
      if (existing) {
        const existingNames = new Set((existing.items||[]).map(i=>i.name.toLowerCase()));
        const newItems = formattedItems.filter(i => !existingNames.has(i.name.toLowerCase()));
        if (newItems.length) {
          await suppliers.update(existing.id, { items: [...(existing.items||[]), ...newItems], fromStockSeed: true });
          count += newItems.length;
        }
      } else {
        await suppliers.add({ name: supName, contact:'', email:'', orderEvery:7, lastOrderDate:null, items: formattedItems, fromStockSeed: true });
        count += formattedItems.length;
      }
    }
    setStatus('done:' + count);
  };

  if (status && status.startsWith('done:')) {
    return (
      <div style={{background:'#0d1a0d',border:'1px solid #2a4a2a',borderRadius:10,padding:14,marginBottom:14,fontSize:13,color:'#3daa6e'}}>
        ✓ Imported {status.split(':')[1]} items across your suppliers
      </div>
    );
  }

  return (
    <div style={{background:'#161616',border:'1px solid #2a2010',borderRadius:10,padding:14,marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{flex:1,minWidth:200}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>Full stock list ready to import</div>
        <div style={{fontSize:11,color:'#666'}}>78 items across Bidfood, Costco, New West Foods, Spudshed, Il Granino, Paradise Poultry & Spice Wagon</div>
      </div>
      <button onClick={doImport} disabled={status==='importing'} style={{...SB,fontSize:12,padding:'7px 14px'}}>
        {status==='importing'?'Importing...':'Import stock list'}
      </button>
    </div>
  );
}


// Menu Tab
function MenuTab({ menuItems, suppliers }) {
  const [search, setSearch] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [importStatus, setImportStatus] = useState(null);

  const allStockItems = suppliers.docs.flatMap(s => (s.items||[]).map(i => ({...i, supplierName: s.name, supplierId: s.id})));
  const alreadyImported = menuItems.docs.length > 0;

  const doImport = async () => {
    setImportStatus('importing');
    let count = 0;
    for (const cat of MENU_SEED.categories) {
      for (const item of cat.items) {
        const exists = menuItems.docs.find(m => m.name.toLowerCase() === item.name.toLowerCase());
        if (exists) continue;
        await menuItems.add({ name: item.name, price: item.price, desc: item.desc||'', category: cat.name, categoryNote: cat.note||'', linkedStock: [], available: true });
        count++;
      }
    }
    setImportStatus('done:' + count);
  };

  const filtered = menuItems.docs.filter(m => m.name.toLowerCase().includes(search.toLowerCase()) || m.category.toLowerCase().includes(search.toLowerCase()));

  // Group by category, preserve seed order
  const catOrder = MENU_SEED.categories.map(c => c.name);
  const grouped = {};
  filtered.forEach(m => { if (!grouped[m.category]) grouped[m.category] = []; grouped[m.category].push(m); });
  const sortedCats = Object.keys(grouped).sort((a,b) => catOrder.indexOf(a) - catOrder.indexOf(b));

  const toggleLink = async (item, stockItem) => {
    const linked = item.linkedStock || [];
    const key = stockItem.supplierId + ':' + stockItem.id;
    const exists = linked.some(l => l.key === key);
    const newLinked = exists ? linked.filter(l => l.key !== key) : [...linked, { key, name: stockItem.name, supplierId: stockItem.supplierId, itemId: stockItem.id }];
    await menuItems.update(item.id, { linkedStock: newLinked });
  };

  const isOutOfStock = (item) => {
    const linked = item.linkedStock || [];
    if (!linked.length) return false;
    return linked.some(l => {
      const sup = suppliers.docs.find(s => s.id === l.supplierId);
      const stockItem = sup && (sup.items||[]).find(i => i.id === l.itemId);
      return stockItem && stockItem.currentStock <= 0;
    });
  };

  const estCost = (item) => {
    const linked = item.linkedStock || [];
    if (!linked.length) return 0;
    return linked.reduce((sum, l) => {
      const sup = suppliers.docs.find(s => s.id === l.supplierId);
      const stockItem = sup && (sup.items||[]).find(i => i.id === l.itemId);
      return sum + (stockItem ? stockItem.price : 0);
    }, 0);
  };

  if (!alreadyImported) {
    return (
      <div style={{background:'#161616',border:'1px solid #2a2010',borderRadius:10,padding:20,textAlign:'center'}}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>Menu not loaded yet</div>
        <div style={{fontSize:12,color:'#666',marginBottom:14}}>Import the My Grill Friend menu — 100 items across burgers, philly, wings, pizza, drinks & dessert</div>
        <button onClick={doImport} disabled={importStatus==='importing'} style={SB}>
          {importStatus==='importing'?'Importing...':'Import menu'}
        </button>
      </div>
    );
  }

  return (
    <div>
      <input placeholder="Search menu..." value={search} onChange={e=>setSearch(e.target.value)} style={{...SI,marginBottom:18}}/>

      {sortedCats.map(catName => {
        const catMeta = MENU_SEED.categories.find(c => c.name === catName);
        return (
          <div key={catName} style={{marginBottom:22}}>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#C8873A'}}>{catName}</div>
              {catMeta?.note && <div style={{fontSize:11,color:'#555',marginTop:2}}>{catMeta.note}</div>}
            </div>
            {grouped[catName].map(item => {
              const oos = isOutOfStock(item);
              const isOpen = expanded === item.id;
              return (
                <div key={item.id} style={{...SC, opacity: item.available===false?0.5:1}}>
                  <div style={{padding:'11px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setExpanded(isOpen?null:item.id)}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:8}}>
                        {item.name}
                        {oos && <span style={{fontSize:9,color:'#cc3222',fontWeight:700,background:'#1e0505',padding:'1px 6px',borderRadius:20}}>OUT OF STOCK</span>}
                        {item.available===false && <span style={{fontSize:9,color:'#666',fontWeight:700,background:'#1a1a1a',padding:'1px 6px',borderRadius:20}}>86'D</span>}
                      </div>
                      {item.desc && <div style={{fontSize:11,color:'#555',marginTop:2}}>{item.desc}</div>}
                      {estCost(item) > 0 && (
                        <div style={{fontSize:10,color:'#3a5a40',marginTop:3,fontFamily:'DM Mono,monospace'}}>
                          est. cost ${estCost(item).toFixed(2)} · margin {(((item.price-estCost(item))/item.price)*100).toFixed(0)}%
                        </div>
                      )}
                    </div>
                    <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'#C8873A',fontSize:14}}>${item.price.toFixed(2)}</div>
                  </div>
                  {isOpen && (
                    <div style={{padding:'0 14px 12px',borderTop:'1px solid #1a1a1a'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'10px 0 8px'}}>
                        <span style={{fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:0.5}}>Linked ingredients</span>
                        <button onClick={()=>menuItems.update(item.id,{available: item.available===false ? true : false})} style={{...SG,fontSize:10,padding:'3px 8px',color:item.available===false?'#3daa6e':'#cc3222'}}>
                          {item.available===false?'Mark available':"86 this item"}
                        </button>
                      </div>
                      {(item.linkedStock||[]).length>0 && (
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                          {(item.linkedStock||[]).map(l=>(
                            <span key={l.key} style={{fontSize:11,background:'#1e1e1e',color:'#aaa',padding:'3px 9px',borderRadius:20,display:'flex',alignItems:'center',gap:6}}>
                              {l.name}
                              <span onClick={()=>toggleLink(item,{supplierId:l.supplierId,id:l.itemId,name:l.name})} style={{cursor:'pointer',color:'#cc3222'}}>✕</span>
                            </span>
                          ))}
                        </div>
                      )}
                      <details>
                        <summary style={{fontSize:11,color:'#C8873A',cursor:'pointer',listStyle:'none'}}>+ Link stock item</summary>
                        <div style={{maxHeight:160,overflowY:'auto',marginTop:8,background:'#111',borderRadius:6,padding:8}}>
                          {allStockItems.length===0 && <div style={{fontSize:11,color:'#444'}}>No stock items yet — import your stock list in Suppliers tab</div>}
                          {allStockItems.map(si=>{
                            const key = si.supplierId+':'+si.id;
                            const linked = (item.linkedStock||[]).some(l=>l.key===key);
                            return (
                              <div key={key} onClick={()=>toggleLink(item,si)} style={{display:'flex',justifyContent:'space-between',padding:'5px 6px',cursor:'pointer',borderRadius:4,background:linked?'#1e2a1e':'transparent',fontSize:11}}>
                                <span style={{color:linked?'#3daa6e':'#888'}}>{linked?'✓ ':''}{si.name}</span>
                                <span style={{color:'#444'}}>{si.supplierName}</span>
                              </div>
                            );
                          })}
                        </div>
                      </details>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// Needs Pricing panel
function NeedsPricingPanel({ suppliers }) {
  const [open, setOpen] = useState(false);
  const [dismissed, setDismissed] = useState([]);
  const [filling, setFilling] = useState(null);
  const [fillData, setFillData] = useState({supplier:'',price:'',unit:''});

  const existingNames = new Set(suppliers.docs.flatMap(s=>(s.items||[]).map(i=>i.name.toLowerCase())));
  const pending = UNPRICED_SEED.filter(i => !existingNames.has(i.name.toLowerCase()) && !dismissed.includes(i.name));

  const saveItem = async (item) => {
    const supName = fillData.supplier.trim();
    if (!supName || !fillData.price) return;
    let sup = suppliers.docs.find(s => s.name.toLowerCase() === supName.toLowerCase());
    const newItem = {
      id: 'fill_' + Date.now(),
      name: item.name,
      unit: fillData.unit || item.unit || 'each',
      price: parseFloat(fillData.price),
      lowStock: item.lowStock || 0,
      currentStock: item.lowStock || 0
    };
    if (sup) {
      await suppliers.update(sup.id, { items: [...(sup.items||[]), newItem] });
    } else {
      await suppliers.add({ name: supName, contact:'', email:'', orderEvery:7, lastOrderDate:null, items: [newItem] });
    }
    setFilling(null);
    setFillData({supplier:'',price:'',unit:''});
  };

  if (pending.length === 0) return null;

  return (
    <div style={{...SC, marginBottom:14}}>
      <div onClick={()=>setOpen(!open)} style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:13}}>Needs pricing</div>
          <div style={{fontSize:11,color:'#555'}}>{pending.length} items from your stock list still need a supplier & price</div>
        </div>
        <span style={{color:'#555',fontSize:12}}>{open?'▲':'▼'}</span>
      </div>
      {open && (
        <div style={{borderTop:'1px solid #1a1a1a',maxHeight:340,overflowY:'auto'}}>
          {pending.map(item=>(
            <div key={item.name} style={{padding:'9px 14px',borderBottom:'1px solid #1a1a1a'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:12}}>{item.name}</div>
                  <div style={{fontSize:10,color:'#555'}}>{item.category}{item.unit?' · '+item.unit:''}</div>
                </div>
                <button onClick={()=>{setFilling(filling===item.name?null:item.name);setFillData({supplier:'',price:'',unit:item.unit||''});}} style={{...SG,fontSize:11,padding:'4px 10px'}}>
                  {filling===item.name?'Cancel':'Add price'}
                </button>
                <button onClick={()=>setDismissed(d=>[...d,item.name])} style={{...SG,fontSize:11,padding:'4px 8px',color:'#444'}}>✕</button>
              </div>
              {filling===item.name && (
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                  <input placeholder="Supplier" value={fillData.supplier} onChange={e=>setFillData(p=>({...p,supplier:e.target.value}))} style={{...SI,flex:'1 1 100px',fontSize:12,padding:'5px 7px'}}/>
                  <input placeholder="Unit" value={fillData.unit} onChange={e=>setFillData(p=>({...p,unit:e.target.value}))} style={{...SI,width:65,fontSize:12,padding:'5px 7px'}}/>
                  <input placeholder="$" type="number" value={fillData.price} onChange={e=>setFillData(p=>({...p,price:e.target.value}))} style={{...SI,width:65,fontSize:12,padding:'5px 7px'}}/>
                  <button onClick={()=>saveItem(item)} style={{...SB,fontSize:12,padding:'5px 12px'}}>Save</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Stock tab — browse all items, prices, stock levels across all suppliers
function StockTab({ suppliers }) {
  const [search, setSearch] = useState('');
  const [filterSupplier, setFilterSupplier] = useState('all');
  const [ni, setNi] = useState({});
  const [addingTo, setAddingTo] = useState(null);

  const allItems = suppliers.docs.flatMap(s => (s.items||[]).map(i => ({...i, supplierName: s.name, supplierId: s.id})));
  const low = allItems.filter(i => i.currentStock <= i.lowStock && i.lowStock > 0);

  const filtered = allItems.filter(i => {
    const matchesSearch = i.name.toLowerCase().includes(search.toLowerCase());
    const matchesSupplier = filterSupplier === 'all' || i.supplierId === filterSupplier;
    return matchesSearch && matchesSupplier;
  }).sort((a,b) => a.name.localeCompare(b.name));

  const updateStock = async (item, val) => {
    const sup = suppliers.docs.find(s => s.id === item.supplierId);
    await suppliers.update(sup.id, { items: (sup.items||[]).map(i => i.id===item.id ? {...i, currentStock: parseInt(val)||0} : i) });
  };
  const removeItem = async (item) => {
    const sup = suppliers.docs.find(s => s.id === item.supplierId);
    await suppliers.update(sup.id, { items: (sup.items||[]).filter(i => i.id !== item.id) });
  };
  const addItem = async (supId) => {
    const item = ni[supId];
    if (!item?.name?.trim()) return;
    const sup = suppliers.docs.find(s => s.id === supId);
    const newItem = { id: Date.now().toString(), name: item.name.trim(), unit: item.unit||'each', price: parseFloat(item.price)||0, lowStock: parseInt(item.lowStock)||0, currentStock: parseInt(item.lowStock)||0 };
    await suppliers.update(supId, { items: [...(sup.items||[]), newItem] });
    setNi(p => ({...p, [supId]: {}}));
    setAddingTo(null);
  };

  return (
    <div>
      <StockImportButton suppliers={suppliers}/>
      <NeedsPricingPanel suppliers={suppliers}/>

      {low.length>0&&(
        <div style={{background:'#1a1200',border:'1px solid #5a4000',borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,color:'#C8873A',fontSize:10,textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>Low stock ({low.length})</div>
          {low.map(i=><div key={i.id} style={{fontSize:12,color:'#666',marginBottom:3}}><span style={{color:'#C8873A'}}>{i.name}</span> — {i.currentStock} {i.unit} <span style={{color:'#333'}}>({i.supplierName})</span></div>)}
        </div>
      )}

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <input placeholder="Search items..." value={search} onChange={e=>setSearch(e.target.value)} style={{...SI,flex:'1 1 180px'}}/>
        <select value={filterSupplier} onChange={e=>setFilterSupplier(e.target.value)} style={{...SI,flex:'0 0 160px',background:'#111',border:'1px solid #222',color:'#f0ebe4'}}>
          <option value="all">All suppliers</option>
          {suppliers.docs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <button onClick={()=>setAddingTo(addingTo?null:'new')} style={{...SG,fontSize:12,color:'#C8873A'}}>+ Add item</button>
      </div>

      {addingTo==='new'&&(
        <div style={{...SC,padding:14}}>
          <div style={{fontSize:11,color:'#888',marginBottom:8}}>Add item to which supplier?</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {suppliers.docs.map(s=>(
              <button key={s.id} onClick={()=>setAddingTo(s.id)} style={{...SG,fontSize:12}}>{s.name}</button>
            ))}
          </div>
          {suppliers.docs.length===0&&<div style={{fontSize:12,color:'#555'}}>Add a supplier first in the Suppliers tab</div>}
        </div>
      )}

      {addingTo&&addingTo!=='new'&&(
        <div style={{...SC,padding:14}}>
          <div style={{fontSize:11,color:'#C8873A',marginBottom:8,fontWeight:600}}>New item — {suppliers.docs.find(s=>s.id===addingTo)?.name}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <input placeholder="Item name" value={ni[addingTo]?.name||''} onChange={e=>setNi(p=>({...p,[addingTo]:{...p[addingTo],name:e.target.value}}))} style={{...SI,flex:'1 1 130px',fontSize:12}}/>
            <input placeholder="Unit" value={ni[addingTo]?.unit||''} onChange={e=>setNi(p=>({...p,[addingTo]:{...p[addingTo],unit:e.target.value}}))} style={{...SI,width:70,fontSize:12}}/>
            <input placeholder="$/unit" type="number" value={ni[addingTo]?.price||''} onChange={e=>setNi(p=>({...p,[addingTo]:{...p[addingTo],price:e.target.value}}))} style={{...SI,width:70,fontSize:12}}/>
            <input placeholder="Low stock #" type="number" value={ni[addingTo]?.lowStock||''} onChange={e=>setNi(p=>({...p,[addingTo]:{...p[addingTo],lowStock:e.target.value}}))} style={{...SI,width:90,fontSize:12}}/>
            <button onClick={()=>addItem(addingTo)} style={{...SB,fontSize:12}}>Save</button>
            <button onClick={()=>setAddingTo(null)} style={{...SG,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}

      {filtered.length===0?<Empty msg="No items found"/>:filtered.map(item=>(
        <div key={item.supplierId+'_'+item.id} style={{...SC,padding:'11px 14px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
            <div style={{fontSize:11,color:'#555'}}>{item.supplierName} · {fmtMoney(item.price)}/{item.unit}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,color:'#555'}}>Stock:</span>
            <input type="number" value={item.currentStock} onChange={e=>updateStock(item,e.target.value)} style={{...SI,width:60,padding:'4px 6px',fontSize:12}}/>
            <span style={{fontSize:10,color:item.currentStock<=item.lowStock&&item.lowStock>0?'#C8873A':'#333'}}>{item.currentStock<=item.lowStock&&item.lowStock>0?'LOW':'min '+item.lowStock}</span>
          </div>
          <button onClick={()=>removeItem(item)} style={{...SG,color:'#cc3222',padding:'4px 8px',borderColor:'#222'}}>✕</button>
        </div>
      ))}
    </div>
  );
}

// Suppliers tab — contact info + which items each supplier provides
function SuppliersTab({ suppliers }) {
  const [ns, setNs] = useState({name:'',contact:'',email:'',orderEvery:''});
  const [open, setOpen] = useState(null);
  return (
    <div>
      <div style={{...SC,padding:14,marginBottom:10}}>
        <div style={{fontSize:10,color:'#C8873A',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Add supplier</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input placeholder="Name" value={ns.name} onChange={e=>setNs(p=>({...p,name:e.target.value}))} style={{...SI,flex:'1 1 130px'}}/>
          <input placeholder="Contact" value={ns.contact} onChange={e=>setNs(p=>({...p,contact:e.target.value}))} style={{...SI,flex:'1 1 110px'}}/>
          <input placeholder="Email" value={ns.email} onChange={e=>setNs(p=>({...p,email:e.target.value}))} style={{...SI,flex:'1 1 140px'}}/>
          <input placeholder="Order every X days" type="number" value={ns.orderEvery} onChange={e=>setNs(p=>({...p,orderEvery:e.target.value}))} style={{...SI,flex:'0 0 90px'}}/>
          <button onClick={async()=>{if(!ns.name.trim())return;await suppliers.add({name:ns.name.trim(),contact:ns.contact,email:ns.email,orderEvery:parseInt(ns.orderEvery)||7,items:[],lastOrderDate:null});setNs({name:'',contact:'',email:'',orderEvery:''}); }} style={SB}>Add</button>
        </div>
      </div>
      {suppliers.docs.length===0?<Empty msg="No suppliers yet"/>:suppliers.docs.map(s=>(
        <div key={s.id} style={SC}>
          <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600}}>{s.name}</div>
              {(s.contact||s.email)&&<div style={{fontSize:11,color:'#555'}}>{s.contact}{s.email?' · '+s.email:''}</div>}
              {s.orderEvery&&<div style={{fontSize:10,color:'#444',marginTop:2}}>Order every {s.orderEvery} days{s.lastOrderDate?' · last ordered '+fmtDate(s.lastOrderDate):''}</div>}
            </div>
            <div style={{fontSize:11,color:'#555'}}>{(s.items||[]).length} items</div>
            <button onClick={()=>setOpen(open===s.id?null:s.id)} style={SG}>{open===s.id?'Close':'Edit'}</button>
            <button onClick={()=>suppliers.remove(s.id)} style={{...SG,color:'#cc3222',borderColor:'#222'}}>✕</button>
          </div>
          {open===s.id&&(
            <div style={{borderTop:'1px solid #1e1e1e',padding:'12px 14px',display:'flex',gap:8,flexWrap:'wrap'}}>
              <input defaultValue={s.name} onBlur={e=>suppliers.update(s.id,{name:e.target.value})} style={{...SI,flex:'1 1 120px',fontSize:12}}/>
              <input defaultValue={s.contact} placeholder="Contact" onBlur={e=>suppliers.update(s.id,{contact:e.target.value})} style={{...SI,flex:'1 1 110px',fontSize:12}}/>
              <input defaultValue={s.email} placeholder="Email" onBlur={e=>suppliers.update(s.id,{email:e.target.value})} style={{...SI,flex:'1 1 140px',fontSize:12}}/>
              <input defaultValue={s.orderEvery} placeholder="Order every X days" type="number" onBlur={e=>suppliers.update(s.id,{orderEvery:parseInt(e.target.value)||7})} style={{...SI,width:120,fontSize:12}}/>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// Orders tab
function OrdersTab({ suppliers, orders }) {
  const [view, setView] = useState('new');
  const [sel, setSel] = useState('');
  const [qty, setQty] = useState({});
  const [notes, setNotes] = useState('');
  const sup = suppliers.docs.find(s=>s.id===sel);
  const STATUS = {draft:{l:'Draft',c:'#555'},sent:{l:'Sent',c:'#C8873A'},received:{l:'Received',c:'#3daa6e'}};
  const submit = async () => {
    if(!sup) return;
    const items=(sup.items||[]).filter(i=>qty[i.id]>0).map(i=>({...i,qty:parseFloat(qty[i.id])||0}));
    if(!items.length) return;
    await orders.add({supplierId:sup.id,supplierName:sup.name,items,total:items.reduce((s,i)=>s+i.price*i.qty,0),notes,status:'draft'});
    // update supplier lastOrderDate
    await suppliers.update(sup.id, {lastOrderDate: todayStr()});
    setQty({}); setNotes(''); setView('history');
  };
  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:20}}>
        {[['new','New Order'],['history','History']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,background:view===v?'#C8873A':'#161616',color:view===v?'#fff':'#777'}}>{l}</button>
        ))}
      </div>
      {view==='new'&&(<div>
        <div style={{...SC,padding:14,marginBottom:10}}>
          <select value={sel} onChange={e=>{setSel(e.target.value);setQty({});}} style={{...SI,background:'#111',border:'1px solid #222',color:'#f0ebe4'}}>
            <option value="">Select supplier...</option>
            {suppliers.docs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        {sup&&(<div style={{...SC,padding:14}}>
          {(sup.items||[]).length===0?<div style={{color:'#444',fontSize:13}}>No items for this supplier yet</div>:(
            <>
              {(sup.items||[]).map(i=>(<div key={i.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid #1a1a1a'}}>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{i.name}</div><div style={{fontSize:11,color:'#555'}}>{fmtMoney(i.price)}/{i.unit}</div></div>
                <input type="number" min="0" placeholder="Qty" value={qty[i.id]||''} onChange={e=>setQty(p=>({...p,[i.id]:e.target.value}))} style={{...SI,width:65,padding:'5px 7px'}}/>
                <div style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'#C8873A',width:65,textAlign:'right'}}>{qty[i.id]>0?fmtMoney(i.price*qty[i.id]):''}</div>
              </div>))}
              <div style={{marginTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontWeight:600}}>Total</span>
                  <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'#C8873A',fontSize:18}}>{fmtMoney((sup.items||[]).reduce((s,i)=>s+(i.price*(qty[i.id]||0)),0))}</span>
                </div>
                <textarea placeholder="Notes" value={notes} onChange={e=>setNotes(e.target.value)} style={{...SI,minHeight:50,marginBottom:10,resize:'vertical'}}/>
                <button onClick={submit} style={{...SB,width:'100%'}}>Save as Draft</button>
              </div>
            </>
          )}
        </div>)}
      </div>)}
      {view==='history'&&(<div>
        {[...orders.docs].sort((a,b)=>b.createdAt-a.createdAt).map(o=>(<div key={o.id} style={{...SC,padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div style={{flex:1}}><div style={{fontWeight:600}}>{o.supplierName}</div></div>
            <span style={{fontSize:11,fontWeight:700,color:STATUS[o.status]?.c,background:STATUS[o.status]?.c+'22',padding:'2px 8px',borderRadius:20}}>{STATUS[o.status]?.l}</span>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'#C8873A'}}>{fmtMoney(o.total)}</div>
          </div>
          {(o.items||[]).map(i=><div key={i.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#555',padding:'1px 0'}}><span>{i.name} × {i.qty}</span><span>{fmtMoney(i.price*i.qty)}</span></div>)}
          <div style={{display:'flex',gap:8,marginTop:10}}>
            {o.status==='draft'&&<button onClick={()=>orders.update(o.id,{status:'sent'})} style={{...SG,color:'#C8873A'}}>Mark Sent</button>}
            {o.status==='sent'&&<button onClick={()=>orders.update(o.id,{status:'received'})} style={{...SG,color:'#3daa6e'}}>Mark Received</button>}
            <button onClick={()=>orders.remove(o.id)} style={{...SG,color:'#cc3222',borderColor:'#222'}}>Delete</button>
          </div>
        </div>))}
        {orders.docs.length===0&&<Empty msg="No orders yet"/>}
      </div>)}
    </div>
  );
}

// Main app
function App() {
  const [tab, setTab] = useState('staff');
  const workers = useFirestore('workers');
  const shifts = useFirestore('shifts');
  const suppliers = useFirestore('suppliers');
  const orders = useFirestore('orders');
  const templates = useFirestore('templates');
  const menuItems = useFirestore('menuItems');
  const weeklyPnl = useFirestore('weeklyPnl');
  const TABS = [['dashboard','Dashboard'],['staff','Staff'],['workers','Workers'],['roster','Roster'],['payroll','Payroll'],['history','Pay History'],['pnl','Weekly P&L'],['import','Import'],['menu','Menu'],['stock','Stock'],['suppliers','Suppliers'],['orders','Orders']];
  return (
    <div style={{minHeight:'100vh',background:'#0e0e0e'}}>
      <div style={{background:'#0e0e0e',borderBottom:'1px solid #1e1e1e',padding:'0 16px',display:'flex',alignItems:'center',gap:11,height:50,position:'sticky',top:0,zIndex:10}}>
        <img src={LOGO} alt="MGF" style={{height:34,width:34,objectFit:'contain',filter:'drop-shadow(0 0 1px rgba(200,135,58,0.3))'}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14,letterSpacing:-0.3,lineHeight:1.1}}>My Grill Friend</div>
          <div style={{fontSize:9,color:'#333',letterSpacing:0.8,textTransform:'uppercase'}}>
            {workers.ready?<span style={{color:'#2d6a40'}}>● synced</span>:'connecting...'}
          </div>
        </div>
      </div>
      <div style={{background:'#0a0a0a',borderBottom:'1px solid #1a1a1a',display:'flex',overflowX:'auto',padding:'0 6px'}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            flexShrink:0,padding:'11px 13px',background:'transparent',
            color:tab===k?'#f0ebe4':'#444',
            border:'none',borderBottom:tab===k?'2px solid #C8873A':'2px solid transparent',
            cursor:'pointer',fontWeight:tab===k?600:400,fontSize:13,
            fontFamily:'DM Sans,sans-serif',marginBottom:-1,letterSpacing:0.1
          }}>{l}</button>
        ))}
      </div>
      <div style={{padding:'20px 16px',maxWidth:860,margin:'0 auto'}}>
        {!workers.ready?<div style={{textAlign:'center',color:'#2a2a2a',padding:'60px 0',fontSize:13}}>Connecting...</div>:(
          <>
            {tab==='dashboard'&&<DashboardTab workers={workers} shifts={shifts} suppliers={suppliers} orders={orders}/>}
            {tab==='staff'&&<StaffTab workers={workers} shifts={shifts}/>}
            {tab==='workers'&&<WorkersTab workers={workers}/>}
            {tab==='roster'&&<RosterTab workers={workers} shifts={shifts} templates={templates}/>}
            {tab==='payroll'&&<PayrollTab workers={workers} shifts={shifts}/>}
            {tab==='history'&&<PayHistoryTab workers={workers}/>}
            {tab==='pnl'&&<PnlTab workers={workers} shifts={shifts} orders={orders} weeklyPnl={weeklyPnl}/>}
            {tab==='import'&&<ImportTab workers={workers} shifts={shifts}/>}
            {tab==='menu'&&<MenuTab menuItems={menuItems} suppliers={suppliers}/>}
            {tab==='stock'&&<StockTab suppliers={suppliers}/>}
            {tab==='suppliers'&&<SuppliersTab suppliers={suppliers}/>}
            {tab==='orders'&&<OrdersTab suppliers={suppliers} orders={orders}/>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
