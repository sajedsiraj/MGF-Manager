// ── Excel serial date to JS Date ──────────────────────────────
function excelSerialToDate(serial) {
  // Excel epoch is Jan 1 1900, but has a leap year bug (treats 1900 as leap)
  const utc_days = Math.floor(serial - 25569);
  const utc_value = utc_days * 86400;
  return new Date(utc_value * 1000);
}

function excelSerialToTimeStr(serial) {
  const totalSeconds = Math.round((serial % 1) * 86400);
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function excelSerialToDateStr(serial) {
  const d = excelSerialToDate(serial);
  return d.toISOString().split('T')[0];
}

// ── Parse TimeSquared XLSX ────────────────────────────────────
function parseTimeSquaredXLSX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const results = []; // { name, rate, shifts: [{date, start, end}] }

        // Skip first sheet (Summary), process employee sheets
        wb.SheetNames.slice(1).forEach(sheetName => {
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

          // Row 1 (index 1) has the employee name in col B
          const nameRow = rows[1];
          const name = nameRow && nameRow[1] ? String(nameRow[1]).trim() : null;
          if (!name) return;

          // Row 3 (index 3) is the header row
          // Data rows start at index 4
          // Columns: [project, startDate, start, end, length, rate, paid, pay, break, totalHours]
          let rate = 0;
          const shifts = [];

          for (let i = 4; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row[2] === null || row[2] === undefined) continue;
            // Check if it's a totals row
            if (typeof row[2] === 'string' && row[2].toLowerCase().includes('total')) break;
            // col index 2 = start serial, col 3 = end serial, col 5 = rate
            const startSerial = row[2];
            const endSerial = row[3];
            const rowRate = row[5];
            if (typeof startSerial !== 'number' || typeof endSerial !== 'number') continue;
            if (rowRate && rowRate > 0) rate = rowRate;
            const dateStr = excelSerialToDateStr(startSerial);
            const startTime = excelSerialToTimeStr(startSerial);
            const endTime = excelSerialToTimeStr(endSerial);
            shifts.push({ date: dateStr, start: startTime, end: endTime });
          }

          if (shifts.length > 0 || rate > 0) {
            results.push({ name, rate, shifts });
          }
        });

        resolve(results);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ── Firebase hook ─────────────────────────────────────────────
function useFirestore(collectionName) {
  const [docs, setDocs] = useState([]);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const init = () => {
      if (!window.__db) return;
      const { collection, onSnapshot } = window.__fs;
      const ref = collection(window.__db, collectionName);
      const unsub = onSnapshot(ref, snap => {
        setDocs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setReady(true);
      });
      return unsub;
    };
    if (window.__fbReady) {
      const unsub = init();
      return () => unsub && unsub();
    } else {
      const handler = () => { init(); };
      window.addEventListener("firebase-ready", handler);
      return () => window.removeEventListener("firebase-ready", handler);
    }
  }, [collectionName]);

  const add = async (data) => {
    const { addDoc, collection } = window.__fs;
    return await addDoc(collection(window.__db, collectionName), { ...data, createdAt: Date.now() });
  };
  const set = async (id, data) => {
    const { doc, setDoc } = window.__fs;
    await setDoc(doc(window.__db, collectionName, id), data, { merge: true });
  };
  const remove = async (id) => {
    const { doc, deleteDoc } = window.__fs;
    await deleteDoc(doc(window.__db, collectionName, id));
  };
  const update = async (id, data) => {
    const { doc, updateDoc } = window.__fs;
    await updateDoc(doc(window.__db, collectionName, id), data);
  };

  return { docs, ready, add, set, remove, update };
}

// ── Helpers ───────────────────────────────────────────────────
function getWeekDates(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}
function fmtDate(d) { return d.toISOString().split("T")[0]; }
function fmtDisplay(d) { return d.toLocaleDateString("en-AU", { day: "numeric", month: "short" }); }
function hoursWorked(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  const diff = (eh * 60 + em - (sh * 60 + sm)) / 60;
  return diff > 0 ? parseFloat(diff.toFixed(2)) : 0;
}
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
function fmtMoney(n) { return `$${parseFloat(n||0).toFixed(2)}`; }
function weekLabel(offset) {
  const dates = getWeekDates(offset);
  return `${fmtDisplay(dates[0])} – ${fmtDisplay(dates[6])}`;
}

// ── ShiftCell ─────────────────────────────────────────────────
function ShiftCell({ shift, workerColor, onChange }) {
  const [open, setOpen] = useState(false);
  const [start, setStart] = useState(shift?.start||"09:00");
  const [end, setEnd] = useState(shift?.end||"17:00");
  const hrs = shift ? hoursWorked(shift.start, shift.end) : 0;

  if (open) return (
    <div style={{background:"#222",borderRadius:6,padding:6,minWidth:90}}>
      <input type="time" value={start} onChange={e=>setStart(e.target.value)} style={{...inp,padding:"2px 4px",fontSize:11,width:"100%",marginBottom:3}} />
      <input type="time" value={end} onChange={e=>setEnd(e.target.value)} style={{...inp,padding:"2px 4px",fontSize:11,width:"100%",marginBottom:4}} />
      <div style={{display:"flex",gap:3}}>
        <button onClick={()=>{onChange({start,end});setOpen(false);}} style={{flex:1,background:"#E63946",border:"none",color:"#fff",borderRadius:4,padding:"2px 0",cursor:"pointer",fontSize:10,fontWeight:700}}>✓</button>
        <button onClick={()=>{onChange(null);setOpen(false);}} style={{flex:1,background:"#333",border:"none",color:"#aaa",borderRadius:4,padding:"2px 0",cursor:"pointer",fontSize:10}}>✕</button>
      </div>
    </div>
  );

  return shift ? (
    <div onClick={()=>setOpen(true)} style={{background:workerColor+"22",border:`1px solid ${workerColor}55`,borderRadius:6,padding:"4px 5px",cursor:"pointer",textAlign:"center"}}>
      <div style={{fontSize:10,color:workerColor,fontWeight:700}}>{hrs}h</div>
      <div style={{fontSize:9,color:"#888"}}>{shift.start}–{shift.end}</div>
    </div>
  ) : (
    <div onClick={()=>setOpen(true)} style={{height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#333",fontSize:16,borderRadius:6}}
      onMouseEnter={e=>e.currentTarget.style.background="#222"}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>+</div>
  );
}

// ── IMPORT TAB ────────────────────────────────────────────────
function ImportTab({ workers, shifts }) {
  const [status, setStatus] = useState(null); // null | loading | preview | done | error
  const [preview, setPreview] = useState([]);
  const [importResult, setImportResult] = useState(null);
  const fileRef = useRef();

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setStatus("loading");
    setPreview([]);
    try {
      const parsed = await parseTimeSquaredXLSX(file);
      // Match against existing workers by name (fuzzy — trim + lowercase)
      const enriched = parsed.map(p => {
        const match = workers.docs.find(w => w.name.trim().toLowerCase() === p.name.trim().toLowerCase());
        return { ...p, workerId: match?.id || null, workerColor: match?.color || "#666", matched: !!match };
      }).filter(p => p.shifts.length > 0);
      setPreview(enriched);
      setStatus("preview");
    } catch(err) {
      console.error(err);
      setStatus("error");
    }
  };

  const doImport = async () => {
    setStatus("loading");
    let imported = 0;
    let skipped = 0;
    for (const person of preview) {
      if (!person.workerId) { skipped += person.shifts.length; continue; }
      for (const shift of person.shifts) {
        const id = `${person.workerId}_${shift.date}`;
        // Don't overwrite existing shifts
        const existing = shifts.docs.find(s => s.id === id);
        if (existing) { skipped++; continue; }
        await shifts.set(id, { workerId: person.workerId, date: shift.date, start: shift.start, end: shift.end, source: "timesquared" });
        imported++;
      }
    }
    setImportResult({ imported, skipped });
    setStatus("done");
    if (fileRef.current) fileRef.current.value = "";
  };

  const reset = () => { setStatus(null); setPreview([]); setImportResult(null); };

  const totalShifts = preview.reduce((s, p) => s + p.shifts.length, 0);
  const matchedShifts = preview.filter(p => p.matched).reduce((s, p) => s + p.shifts.length, 0);
  const unmatchedWorkers = preview.filter(p => !p.matched);

  return (
    <div>
      <div style={card}>
        <div style={{fontWeight:700,marginBottom:4,color:"#E63946"}}>Import from TimeSquared</div>
        <div style={{fontSize:13,color:"#666",marginBottom:16}}>Export a Payroll Report from TimeSquared, then upload it here. Shifts are matched by worker name and saved to the roster.</div>

        {(status === null || status === "error") && (
          <>
            <label style={{...redBtn, display:"inline-block", cursor:"pointer"}}>
              📂 Choose XLSX file
              <input ref={fileRef} type="file" accept=".xlsx" onChange={handleFile} style={{display:"none"}} />
            </label>
            {status === "error" && <div style={{color:"#E63946",fontSize:13,marginTop:10}}>⚠️ Couldn't read that file. Make sure it's a TimeSquared Payroll Report.</div>}
          </>
        )}

        {status === "loading" && (
          <div style={{color:"#888",fontSize:13}}>Reading file...</div>
        )}

        {status === "done" && importResult && (
          <div>
            <div style={{background:"#0a2a1a",border:"1px solid #2A9D8F",borderRadius:8,padding:14,marginBottom:12}}>
              <div style={{color:"#2A9D8F",fontWeight:700,fontSize:16,marginBottom:4}}>✓ Import complete</div>
              <div style={{fontSize:13,color:"#ccc"}}>{importResult.imported} shifts imported · {importResult.skipped} skipped (already existed or unmatched worker)</div>
            </div>
            <button onClick={reset} style={ghostBtn}>Import another file</button>
          </div>
        )}

        {status === "preview" && preview.length === 0 && (
          <div style={{color:"#888",fontSize:13}}>No shifts found in this file.</div>
        )}

        {status === "preview" && preview.length > 0 && (
          <div>
            <div style={{background:"#1e1e1e",borderRadius:8,padding:12,marginBottom:12}}>
              <div style={{fontWeight:700,marginBottom:8}}>Preview — {totalShifts} shifts found</div>
              {unmatchedWorkers.length > 0 && (
                <div style={{background:"#2a1a00",border:"1px solid #F4A261",borderRadius:6,padding:10,marginBottom:10}}>
                  <div style={{color:"#F4A261",fontWeight:700,fontSize:12,marginBottom:4}}>⚠️ These workers aren't in your Workers list — their shifts will be skipped:</div>
                  {unmatchedWorkers.map(p => (
                    <div key={p.name} style={{fontSize:12,color:"#ccc"}}>{p.name} ({p.shifts.length} shifts)</div>
                  ))}
                  <div style={{fontSize:11,color:"#666",marginTop:4}}>Add them in the Workers tab first, then re-import.</div>
                </div>
              )}
              <div style={{maxHeight:280,overflowY:"auto"}}>
                {preview.filter(p=>p.matched).map(person => (
                  <div key={person.name} style={{marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:person.workerColor}}/>
                      <div style={{fontWeight:700,fontSize:13}}>{person.name}</div>
                      <div style={{fontSize:11,color:"#2A9D8F"}}>✓ matched</div>
                      <div style={{fontSize:11,color:"#555",marginLeft:"auto"}}>{person.shifts.length} shifts</div>
                    </div>
                    {person.shifts.map((s,i) => (
                      <div key={i} style={{display:"flex",gap:12,fontSize:12,color:"#888",paddingLeft:16,marginBottom:2}}>
                        <span style={{width:90}}>{s.date}</span>
                        <span>{s.start} – {s.end}</span>
                        <span style={{color:"#555"}}>{hoursWorked(s.start,s.end)}h</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={doImport} style={redBtn}>Import {matchedShifts} shifts</button>
              <button onClick={reset} style={ghostBtn}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      <div style={{...card,background:"#161616"}}>
        <div style={{fontWeight:700,marginBottom:8,fontSize:13}}>How to export from TimeSquared</div>
        {[
          "Open TimeSquared → Reports tab",
          "Select Payroll Report",
          "Set your date range",
          "Tap Export → choose XLSX",
          "Upload that file here"
        ].map((step,i) => (
          <div key={i} style={{display:"flex",gap:10,marginBottom:6,fontSize:13,color:"#888"}}>
            <span style={{color:"#E63946",fontWeight:700,width:18,flexShrink:0}}>{i+1}.</span>
            <span>{step}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ROSTER TAB ────────────────────────────────────────────────
function RosterTab({ workers, shifts }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const weekDates = getWeekDates(weekOffset);
  const getShift = (wid, date) => shifts.docs.find(s => s.workerId===wid && s.date===date)||null;
  const setShift = async (wid, date, val) => {
    const id = `${wid}_${date}`;
    if (val) await shifts.set(id, { workerId:wid, date, ...val });
    else await shifts.remove(id);
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={navBtn}>← Prev</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:700,fontSize:15}}>{fmtDisplay(weekDates[0])} – {fmtDisplay(weekDates[6])}</div>
          {weekOffset===0 && <div style={{fontSize:11,color:"#E63946"}}>THIS WEEK</div>}
        </div>
        <button onClick={()=>setWeekOffset(w=>w+1)} style={navBtn}>Next →</button>
      </div>
      {workers.docs.length===0 ? (
        <div style={{textAlign:"center",color:"#555",padding:"60px 0"}}>No workers yet — add them in the Workers tab</div>
      ) : (
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:620}}>
            <thead>
              <tr>
                <th style={{...th,textAlign:"left",width:100}}>Worker</th>
                {weekDates.map((d,i)=>(
                  <th key={i} style={{...th,background:isToday(d)?"#2a1a1a":"#1a1a1a"}}>
                    <div style={{color:isToday(d)?"#E63946":"#888",fontSize:10,fontWeight:600}}>{DAYS[i]}</div>
                    <div style={{fontWeight:700}}>{d.getDate()}</div>
                  </th>
                ))}
                <th style={th}>Hrs</th>
              </tr>
            </thead>
            <tbody>
              {workers.docs.map(worker=>{
                const weekHours = weekDates.reduce((sum,d)=>{
                  const s=getShift(worker.id,fmtDate(d));
                  return sum+(s?hoursWorked(s.start,s.end):0);
                },0);
                return (
                  <tr key={worker.id}>
                    <td style={{padding:"6px 4px",borderBottom:"1px solid #222"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:worker.color,flexShrink:0}}/>
                        <div>
                          <div style={{fontWeight:600,fontSize:12}}>{worker.name}</div>
                          <div style={{fontSize:10,color:"#666"}}>${worker.rate}/hr</div>
                        </div>
                      </div>
                    </td>
                    {weekDates.map((d,i)=>{
                      const dateStr=fmtDate(d);
                      const shift=getShift(worker.id,dateStr);
                      return (
                        <td key={i} style={{padding:"4px 2px",borderBottom:"1px solid #222",background:isToday(d)?"#181010":"transparent"}}>
                          <ShiftCell shift={shift} workerColor={worker.color} onChange={val=>setShift(worker.id,dateStr,val)}/>
                        </td>
                      );
                    })}
                    <td style={{textAlign:"center",fontWeight:700,color:weekHours>0?"#E63946":"#444",borderBottom:"1px solid #222"}}>
                      {weekHours>0?weekHours.toFixed(1):"–"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── WORKERS TAB ───────────────────────────────────────────────
function WorkersTab({ workers }) {
  const [newWorker, setNewWorker] = useState({name:"",rate:"",role:""});
  const [editing, setEditing] = useState(null);
  const add = async () => {
    if (!newWorker.name.trim()||!newWorker.rate) return;
    await workers.add({ name:newWorker.name.trim(), rate:parseFloat(newWorker.rate), role:newWorker.role.trim()||"Team Member", color:COLORS[workers.docs.length%COLORS.length] });
    setNewWorker({name:"",rate:"",role:""});
  };
  return (
    <div>
      <div style={card}>
        <div style={{fontWeight:700,marginBottom:12,color:"#E63946"}}>Add Worker</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input placeholder="Name" value={newWorker.name} onChange={e=>setNewWorker(p=>({...p,name:e.target.value}))} style={{...inp,flex:"1 1 130px"}}/>
          <input placeholder="Role" value={newWorker.role} onChange={e=>setNewWorker(p=>({...p,role:e.target.value}))} style={{...inp,flex:"1 1 130px"}}/>
          <input placeholder="$/hr" type="number" value={newWorker.rate} onChange={e=>setNewWorker(p=>({...p,rate:e.target.value}))} style={{...inp,flex:"0 0 80px"}}/>
          <button onClick={add} style={redBtn}>Add</button>
        </div>
      </div>
      {workers.docs.length===0 ? (
        <div style={{textAlign:"center",color:"#555",padding:"40px 0"}}>No workers yet</div>
      ) : workers.docs.map(w=>(
        <div key={w.id} style={{...card,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:12,height:12,borderRadius:"50%",background:w.color,flexShrink:0}}/>
          {editing===w.id ? (
            <div style={{display:"flex",gap:8,flex:1,flexWrap:"wrap"}}>
              <input defaultValue={w.name} onBlur={e=>workers.update(w.id,{name:e.target.value})} style={{...inp,flex:"1 1 120px"}}/>
              <input defaultValue={w.role} onBlur={e=>workers.update(w.id,{role:e.target.value})} style={{...inp,flex:"1 1 120px"}}/>
              <input type="number" defaultValue={w.rate} onBlur={e=>workers.update(w.id,{rate:parseFloat(e.target.value)})} style={{...inp,width:70}}/>
              <button onClick={()=>setEditing(null)} style={redBtn}>Done</button>
            </div>
          ) : (
            <>
              <div style={{flex:1}}>
                <div style={{fontWeight:700}}>{w.name}</div>
                <div style={{fontSize:12,color:"#666"}}>{w.role} · ${w.rate}/hr</div>
              </div>
              <button onClick={()=>setEditing(w.id)} style={ghostBtn}>Edit</button>
              <button onClick={()=>workers.remove(w.id)} style={{...ghostBtn,color:"#E63946"}}>Remove</button>
            </>
          )}
        </div>
      ))}
    </div>
  );
}

// ── PAYROLL TAB ───────────────────────────────────────────────
function PayrollTab({ workers, shifts }) {
  const [payPeriod, setPayPeriod] = useState("week");
  const getPayPeriodDates = () => {
    const today = new Date();
    if (payPeriod==="week") return getWeekDates(0).map(fmtDate);
    if (payPeriod==="fortnight") return [...getWeekDates(0).map(fmtDate),...getWeekDates(-1).map(fmtDate)];
    const dates=[], d=new Date(today.getFullYear(),today.getMonth(),1);
    while (d.getMonth()===today.getMonth()) { dates.push(fmtDate(d)); d.setDate(d.getDate()+1); }
    return dates;
  };
  const calcWorkerPay = (worker) => {
    const dates = getPayPeriodDates();
    let totalHours = 0;
    dates.forEach(date => {
      const s = shifts.docs.find(s=>s.workerId===worker.id&&s.date===date);
      if (s) totalHours += hoursWorked(s.start, s.end);
    });
    return { hours:parseFloat(totalHours.toFixed(2)), pay:parseFloat((totalHours*worker.rate).toFixed(2)) };
  };
  const totalPayroll = workers.docs.reduce((sum,w)=>sum+calcWorkerPay(w).pay,0);
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["week","This Week"],["fortnight","Fortnight"],["month","This Month"]].map(([val,label])=>(
          <button key={val} onClick={()=>setPayPeriod(val)} style={{padding:"8px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:payPeriod===val?"#E63946":"#1a1a1a",color:payPeriod===val?"#fff":"#888"}}>{label}</button>
        ))}
      </div>
      {workers.docs.length===0 ? (
        <div style={{textAlign:"center",color:"#555",padding:"40px 0"}}>No workers to show</div>
      ) : (
        <>
          {workers.docs.map(w=>{
            const {hours,pay}=calcWorkerPay(w);
            return (
              <div key={w.id} style={card}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:w.color}}/>
                  <div style={{fontWeight:700,flex:1}}>{w.name}</div>
                  <div style={{fontSize:12,color:"#666"}}>{w.role}</div>
                </div>
                <div style={{display:"flex",gap:20}}>
                  <Stat label="Rate" value={`$${w.rate}/hr`}/>
                  <Stat label="Hours" value={hours>0?`${hours}h`:"–"}/>
                  <Stat label="Total Pay" value={pay>0?fmtMoney(pay):"–"} highlight={pay>0}/>
                </div>
              </div>
            );
          })}
          <div style={{background:"#E63946",borderRadius:10,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:16}}>Total Payroll</div>
            <div style={{fontWeight:800,fontSize:22}}>{fmtMoney(totalPayroll)}</div>
          </div>
        </>
      )}
    </div>
  );
}

// ── SUPPLIERS TAB ─────────────────────────────────────────────
function SuppliersTab({ suppliers }) {
  const [newSupplier, setNewSupplier] = useState({name:"",contact:"",email:""});
  const [newItem, setNewItem] = useState({});
  const [expandedId, setExpandedId] = useState(null);

  const addSupplier = async () => {
    if (!newSupplier.name.trim()) return;
    await suppliers.add({name:newSupplier.name.trim(),contact:newSupplier.contact,email:newSupplier.email,items:[]});
    setNewSupplier({name:"",contact:"",email:""});
  };
  const addItem = async (s) => {
    const item = newItem[s.id];
    if (!item?.name?.trim()) return;
    const items = [...(s.items||[]),{id:Date.now().toString(),name:item.name.trim(),unit:item.unit||"each",price:parseFloat(item.price)||0,lowStock:parseInt(item.lowStock)||0,currentStock:parseInt(item.currentStock||item.lowStock)||0}];
    await suppliers.update(s.id,{items});
    setNewItem(p=>({...p,[s.id]:{}}));
  };
  const removeItem = async (s, itemId) => {
    await suppliers.update(s.id,{items:(s.items||[]).filter(i=>i.id!==itemId)});
  };
  const updateStock = async (s, itemId, val) => {
    await suppliers.update(s.id,{items:(s.items||[]).map(i=>i.id===itemId?{...i,currentStock:parseInt(val)||0}:i)});
  };
  const lowStockItems = suppliers.docs.flatMap(s=>(s.items||[]).filter(i=>i.currentStock<=i.lowStock&&i.lowStock>0).map(i=>({...i,supplierName:s.name})));

  return (
    <div>
      {lowStockItems.length>0 && (
        <div style={{background:"#2a1a00",border:"1px solid #F4A261",borderRadius:10,padding:14,marginBottom:16}}>
          <div style={{fontWeight:700,color:"#F4A261",marginBottom:8}}>⚠️ Low Stock Alerts</div>
          {lowStockItems.map(i=>(
            <div key={i.id} style={{fontSize:13,color:"#ccc",marginBottom:4}}>
              <span style={{color:"#F4A261"}}>{i.name}</span> — {i.currentStock} {i.unit} left <span style={{color:"#555"}}>({i.supplierName})</span>
            </div>
          ))}
        </div>
      )}
      <div style={card}>
        <div style={{fontWeight:700,marginBottom:12,color:"#E63946"}}>Add Supplier</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input placeholder="Supplier name" value={newSupplier.name} onChange={e=>setNewSupplier(p=>({...p,name:e.target.value}))} style={{...inp,flex:"1 1 150px"}}/>
          <input placeholder="Contact" value={newSupplier.contact} onChange={e=>setNewSupplier(p=>({...p,contact:e.target.value}))} style={{...inp,flex:"1 1 130px"}}/>
          <input placeholder="Email" value={newSupplier.email} onChange={e=>setNewSupplier(p=>({...p,email:e.target.value}))} style={{...inp,flex:"1 1 160px"}}/>
          <button onClick={addSupplier} style={redBtn}>Add</button>
        </div>
      </div>
      {suppliers.docs.map(s=>(
        <div key={s.id} style={card}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:expandedId===s.id?12:0}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>{s.name}</div>
              {s.contact&&<div style={{fontSize:12,color:"#666"}}>{s.contact}{s.email?` · ${s.email}`:""}</div>}
            </div>
            <div style={{fontSize:12,color:"#555"}}>{(s.items||[]).length} items</div>
            <button onClick={()=>setExpandedId(expandedId===s.id?null:s.id)} style={ghostBtn}>{expandedId===s.id?"▲ Close":"▼ Items"}</button>
            <button onClick={()=>suppliers.remove(s.id)} style={{...ghostBtn,color:"#E63946"}}>✕</button>
          </div>
          {expandedId===s.id && (
            <div>
              {(s.items||[]).map(item=>(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderTop:"1px solid #222",flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:120}}>
                    <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                    <div style={{fontSize:11,color:"#666"}}>{fmtMoney(item.price)} / {item.unit}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:"#666"}}>Stock:</span>
                    <input type="number" value={item.currentStock} onChange={e=>updateStock(s,item.id,e.target.value)} style={{...inp,width:60,padding:"4px 6px",fontSize:12}}/>
                    <span style={{fontSize:11,color:item.currentStock<=item.lowStock&&item.lowStock>0?"#F4A261":"#555"}}>
                      {item.currentStock<=item.lowStock&&item.lowStock>0?"⚠️ LOW":`min ${item.lowStock}`}
                    </span>
                  </div>
                  <button onClick={()=>removeItem(s,item.id)} style={{...ghostBtn,color:"#E63946",padding:"4px 8px"}}>✕</button>
                </div>
              ))}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:12,paddingTop:12,borderTop:"1px solid #222"}}>
                <input placeholder="Item name" value={newItem[s.id]?.name||""} onChange={e=>setNewItem(p=>({...p,[s.id]:{...p[s.id],name:e.target.value}}))} style={{...inp,flex:"1 1 120px",fontSize:12,padding:"6px 8px"}}/>
                <input placeholder="Unit" value={newItem[s.id]?.unit||""} onChange={e=>setNewItem(p=>({...p,[s.id]:{...p[s.id],unit:e.target.value}}))} style={{...inp,width:70,fontSize:12,padding:"6px 8px"}}/>
                <input placeholder="$/unit" type="number" value={newItem[s.id]?.price||""} onChange={e=>setNewItem(p=>({...p,[s.id]:{...p[s.id],price:e.target.value}}))} style={{...inp,width:70,fontSize:12,padding:"6px 8px"}}/>
                <input placeholder="Low stock #" type="number" value={newItem[s.id]?.lowStock||""} onChange={e=>setNewItem(p=>({...p,[s.id]:{...p[s.id],lowStock:e.target.value}}))} style={{...inp,width:90,fontSize:12,padding:"6px 8px"}}/>
                <button onClick={()=>addItem(s)} style={{...redBtn,fontSize:12,padding:"6px 12px"}}>+ Add</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── ORDERS TAB ────────────────────────────────────────────────
function OrdersTab({ suppliers, orders }) {
  const [view, setView] = useState("new");
  const [selectedSupplier, setSelectedSupplier] = useState("");
  const [quantities, setQuantities] = useState({});
  const [notes, setNotes] = useState("");
  const [weekOffset, setWeekOffset] = useState(0);
  const supplier = suppliers.docs.find(s=>s.id===selectedSupplier);

  const submitOrder = async () => {
    if (!supplier) return;
    const items=(supplier.items||[]).filter(i=>quantities[i.id]>0).map(i=>({...i,qty:parseFloat(quantities[i.id])||0}));
    if (items.length===0) return;
    const total=items.reduce((sum,i)=>sum+i.price*i.qty,0);
    await orders.add({supplierId:supplier.id,supplierName:supplier.name,supplierEmail:supplier.email||"",weekOf:weekLabel(weekOffset),items,total,notes,status:"draft"});
    setQuantities({}); setNotes(""); setView("history");
  };

  const historyOrders = [...orders.docs].sort((a,b)=>b.createdAt-a.createdAt);

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["new","➕ New Order"],["history","📋 History"]].map(([val,label])=>(
          <button key={val} onClick={()=>setView(val)} style={{padding:"8px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===val?"#E63946":"#1a1a1a",color:view===val?"#fff":"#888"}}>{label}</button>
        ))}
      </div>
      {view==="new" && (
        <div>
          <div style={card}>
            <div style={{fontWeight:700,marginBottom:12,color:"#E63946"}}>New Supplier Order</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              <select value={selectedSupplier} onChange={e=>{setSelectedSupplier(e.target.value);setQuantities({});}} style={{flex:"1 1 200px"}}>
                <option value="">Select supplier...</option>
                {suppliers.docs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setWeekOffset(w=>w-1)} style={navBtn}>←</button>
                <span style={{fontSize:13,color:"#aaa",whiteSpace:"nowrap"}}>Week of {weekLabel(weekOffset)}</span>
                <button onClick={()=>setWeekOffset(w=>w+1)} style={navBtn}>→</button>
              </div>
            </div>
          </div>
          {supplier && (
            <div style={card}>
              <div style={{fontWeight:700,marginBottom:12}}>{supplier.name} — Items</div>
              {(supplier.items||[]).length===0 ? (
                <div style={{color:"#555",fontSize:13}}>No items for this supplier yet</div>
              ) : (
                <>
                  {(supplier.items||[]).map(item=>(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #222"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                        <div style={{fontSize:11,color:"#666"}}>{fmtMoney(item.price)} / {item.unit} · Stock: {item.currentStock}</div>
                      </div>
                      <input type="number" min="0" placeholder="Qty" value={quantities[item.id]||""} onChange={e=>setQuantities(p=>({...p,[item.id]:e.target.value}))} style={{...inp,width:70,padding:"6px 8px",fontSize:13}}/>
                      <div style={{fontSize:13,color:"#E63946",fontWeight:700,width:70,textAlign:"right"}}>
                        {quantities[item.id]>0?fmtMoney(item.price*quantities[item.id]):""}
                      </div>
                    </div>
                  ))}
                  <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #222"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                      <span style={{fontWeight:700}}>Order Total</span>
                      <span style={{fontWeight:800,color:"#E63946",fontSize:18}}>{fmtMoney((supplier.items||[]).reduce((sum,i)=>sum+(i.price*(quantities[i.id]||0)),0))}</span>
                    </div>
                    <textarea placeholder="Notes" value={notes} onChange={e=>setNotes(e.target.value)} style={{...inp,width:"100%",minHeight:60,marginBottom:10,resize:"vertical"}}/>
                    <button onClick={submitOrder} style={{...redBtn,width:"100%"}}>Save as Draft</button>
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      )}
      {view==="history" && (
        <div>
          {historyOrders.length===0 ? (
            <div style={{textAlign:"center",color:"#555",padding:"40px 0"}}>No orders yet</div>
          ) : historyOrders.map(order=>(
            <div key={order.id} style={card}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700}}>{order.supplierName}</div>
                  <div style={{fontSize:12,color:"#666"}}>{order.weekOf}</div>
                </div>
                <Tag status={order.status}/>
                <div style={{fontWeight:800,color:"#E63946"}}>{fmtMoney(order.total)}</div>
              </div>
              {(order.items||[]).map(i=>(
                <div key={i.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#aaa",padding:"2px 0"}}>
                  <span>{i.name} × {i.qty} {i.unit}</span>
                  <span>{fmtMoney(i.price*i.qty)}</span>
                </div>
              ))}
              {order.notes&&<div style={{fontSize:12,color:"#666",marginTop:6}}>📝 {order.notes}</div>}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                {order.status==="draft"&&<button onClick={()=>orders.update(order.id,{status:"sent"})} style={{...ghostBtn,color:"#F4A261"}}>Mark Sent</button>}
                {order.status==="sent"&&<button onClick={()=>orders.update(order.id,{status:"received"})} style={{...ghostBtn,color:"#2A9D8F"}}>Mark Received</button>}
                <button onClick={()=>orders.remove(order.id)} style={{...ghostBtn,color:"#E63946"}}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("roster");
  const workers = useFirestore("workers");
  const shifts = useFirestore("shifts");
  const suppliers = useFirestore("suppliers");
  const orders = useFirestore("orders");

  const tabs = [
    ["roster","📅 Roster"],
    ["workers","👥 Workers"],
    ["payroll","💰 Payroll"],
    ["import","⬆️ Import"],
    ["suppliers","🏪 Suppliers"],
    ["orders","📦 Orders"],
  ];

  return (
    <div style={{fontFamily:"'Inter',-apple-system,sans-serif",minHeight:"100vh",background:"#111",color:"#f0f0f0"}}>
      <div style={{background:"#1a1a1a",borderBottom:"2px solid #E63946",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:24}}>🔥</span>
        <div>
          <div style={{fontWeight:800,fontSize:18,letterSpacing:-0.5}}>My Grill Friend</div>
          <div style={{fontSize:11,color:"#888",letterSpacing:1,textTransform:"uppercase"}}>
            Manager · {workers.ready ? <span style={{color:"#2A9D8F"}}>Synced ✓</span> : <span style={{color:"#555"}}>Connecting...</span>}
          </div>
        </div>
      </div>
      <div style={{display:"flex",background:"#1a1a1a",borderBottom:"1px solid #2a2a2a",overflowX:"auto"}}>
        {tabs.map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{flexShrink:0,padding:"11px 14px",background:tab===key?"#E63946":"transparent",color:tab===key?"#fff":"#888",border:"none",cursor:"pointer",fontWeight:tab===key?700:400,fontSize:13}}>{label}</button>
        ))}
      </div>
      <div style={{padding:"20px 16px",maxWidth:900,margin:"0 auto"}}>
        {!workers.ready ? (
          <div style={{textAlign:"center",color:"#555",padding:"60px 0"}}>Connecting to database...</div>
        ) : (
          <>
            {tab==="roster" && <RosterTab workers={workers} shifts={shifts}/>}
            {tab==="workers" && <WorkersTab workers={workers}/>}
            {tab==="payroll" && <PayrollTab workers={workers} shifts={shifts}/>}
            {tab==="import" && <ImportTab workers={workers} shifts={shifts}/>}
            {tab==="suppliers" && <SuppliersTab suppliers={suppliers}/>}
            {tab==="orders" && <OrdersTab suppliers={suppliers} orders={orders}/>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
