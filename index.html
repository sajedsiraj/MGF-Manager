// Firebase hook
function useFirestore(col) {
  const [docs, setDocs] = useState([]);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const init = () => {
      const { collection, onSnapshot } = window.__fs;
      const unsub = onSnapshot(collection(window.__db, col), snap => {
        setDocs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setReady(true);
      });
      return unsub;
    };
    if (window.__fbReady) { const u = init(); return () => u && u(); }
    else {
      const h = () => init();
      window.addEventListener("firebase-ready", h);
      return () => window.removeEventListener("firebase-ready", h);
    }
  }, [col]);
  const add = async (data) => { const { addDoc, collection } = window.__fs; return await addDoc(collection(window.__db, col), { ...data, createdAt: Date.now() }); };
  const set = async (id, data) => { const { doc, setDoc } = window.__fs; await setDoc(doc(window.__db, col, id), data, { merge: true }); };
  const remove = async (id) => { const { doc, deleteDoc } = window.__fs; await deleteDoc(doc(window.__db, col, id)); };
  const update = async (id, data) => { const { doc, updateDoc } = window.__fs; await updateDoc(doc(window.__db, col, id), data); };
  return { docs, ready, add, set, remove, update };
}

// Helpers
function todayStr() { return new Date().toISOString().split('T')[0]; }
function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(d) { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }); }
function fmtMoney(n) { return '$' + parseFloat(n||0).toFixed(2); }
function getWeekDates(offset=0) {
  const now = new Date(), day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((day+6)%7) + offset*7);
  return Array.from({length:7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function fmtDs(d) { return d.toISOString().split('T')[0]; }
function hw(start, end) {
  if (!start||!end) return 0;
  const [sh,sm]=start.split(':').map(Number), [eh,em]=end.split(':').map(Number);
  let diff=(eh*60+em-(sh*60+sm))/60;
  if (diff < 0) diff += 24; // overnight shift e.g. 5pm -> 1am
  return diff>0&&diff<24?parseFloat(diff.toFixed(2)):0;
}
function isToday(d) { const t=new Date(); return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear(); }
function excelDate(s) { return new Date((s-25569)*86400000).toISOString().split('T')[0]; }
function excelTime(s) { const tot=Math.round((s%1)*86400),h=Math.floor(tot/3600),m=Math.floor((tot%3600)/60); return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

function getPayInfo(worker, allShifts) {
  const lastPaid = worker.lastPaidDate || null;
  const lastAmount = worker.lastPaidAmount || 0;
  const now = todayStr();
  const sinceDate = lastPaid || now;
  const relevant = allShifts.filter(s => s.workerId === worker.id && s.date > sinceDate);
  const accruedHours = parseFloat(relevant.reduce((sum,s) => sum + hw(s.start,s.end), 0).toFixed(2));
  const accruedPay = parseFloat((accruedHours * (worker.rate||0)).toFixed(2));
  const daysSince = lastPaid ? daysBetween(lastPaid, now) : null;
  let daysUntil = null, nextPayDate = null;
  if (lastPaid) {
    let next = new Date(lastPaid + 'T00:00:00');
    next.setDate(next.getDate() + 14);
    const nowD = new Date(now + 'T00:00:00');
    while (next <= nowD) next.setDate(next.getDate() + 14);
    nextPayDate = next.toISOString().split('T')[0];
    daysUntil = daysBetween(now, nextPayDate);
  }
  return { lastPaid, lastAmount, daysSince, daysUntil, nextPayDate, accruedHours, accruedPay };
}

          </div>
        ))}
      </div>
    </div>
  );
}

// Pay History Tab
function PayHistoryTab({ workers }) {
  const [filter, setFilter] = useState('all');

  // Flatten all pay history across all workers
  const allEntries = workers.docs.flatMap(w =>
    (w.payHistory || []).map(h => ({ ...h, workerName: w.name, workerColor: w.color, workerId: w.id }))
  ).sort((a, b) => b.ts - a.ts);

  const filtered = filter === 'all' ? allEntries : allEntries.filter(e => e.workerId === filter);

  const totalFiltered = filtered.reduce((s, e) => s + (e.amount || 0), 0);

  // Group by month
  const grouped = {};
  filtered.forEach(e => {
    const key = e.date ? e.date.slice(0, 7) : 'unknown';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(e);
  });
  const months = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  function fmtMonth(key) {
    if (key === 'unknown') return 'Unknown';
    const [y, m] = key.split('-');
    return new Date(parseInt(y), parseInt(m)-1, 1).toLocaleDateString('en-AU', {month:'long', year:'numeric'});
  }

  return (
    <div>
      {/* Filter bar */}
      <div style={{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}}>
        <button onClick={()=>setFilter('all')} style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,background:filter==='all'?'#C8873A':'#161616',color:filter==='all'?'#fff':'#777'}}>All staff</button>
        {workers.docs.map(w=>(
          <button key={w.id} onClick={()=>setFilter(w.id)} style={{padding:'7px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,background:filter===w.id?w.color:'#161616',color:filter===w.id?'#fff':'#777',display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:filter===w.id?'#fff':w.color,display:'inline-block',flexShrink:0}}/>
            {w.name}
          </button>
        ))}
      </div>

      {/* Summary */}
      {filtered.length > 0 && (
        <div style={{display:'flex',gap:16,marginBottom:20,padding:'14px 16px',background:'#161616',borderRadius:10,border:'1px solid #222'}}>
          <div>
            <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.5,marginBottom:2}}>Total paid</div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:22,color:'#C8873A'}}>{fmtMoney(totalFiltered)}</div>
          </div>
          <div>
            <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.5,marginBottom:2}}>Payments</div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:22,color:'#f0ebe4'}}>{filtered.length}</div>
          </div>
          {filter !== 'all' && (
            <div>
              <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.5,marginBottom:2}}>Avg per pay</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:22,color:'#f0ebe4'}}>{fmtMoney(totalFiltered/filtered.length)}</div>
            </div>
          )}
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{textAlign:'center',color:'#333',padding:'50px 0',fontSize:13}}>
          {filter === 'all' ? 'No payments recorded yet — mark staff as paid in the Staff tab' : 'No payments recorded for this worker yet'}
        </div>
      ) : (
        months.map(month => (
          <div key={month} style={{marginBottom:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,paddingBottom:6,borderBottom:'1px solid #1e1e1e'}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:0.5,color:'#555'}}>{fmtMonth(month)}</div>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:12,color:'#C8873A'}}>{fmtMoney(grouped[month].reduce((s,e)=>s+(e.amount||0),0))}</div>
            </div>
            {grouped[month].map((e, i) => (
              <div key={i} style={{background:'#161616',border:'1px solid #222',borderRadius:8,padding:'12px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:9,height:9,borderRadius:'50%',background:e.workerColor,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{e.workerName}</div>
                  <div style={{fontSize:11,color:'#555'}}>{fmtDate(e.date)}{e.hours?' · '+e.hours+'h':''}</div>
                </div>
                <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#C8873A'}}>{fmtMoney(e.amount)}</div>
              </div>
            ))}
          </div>
        ))
      )}
    </div>
  );
}



// Weekly P&L Tab
function PnlTab({ workers, shifts, orders, weeklyPnl }) {
  const [off, setOff] = useState(0);
  const dates = getWeekDates(off);
  const weekKey = fmtDs(dates[0]); // monday date as the week's unique key
  const weekLabel = dates[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'}) + ' – ' + dates[6].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});

  const record = weeklyPnl.docs.find(w => w.id === weekKey) || {};
  const [revenue, setRevenue] = useState('');
  const [stockCost, setStockCost] = useState('');
  const [editingRevenue, setEditingRevenue] = useState(false);
  const [editingStock, setEditingStock] = useState(false);

  useEffect(() => {
    setRevenue(record.revenue != null ? String(record.revenue) : '');
    setStockCost(record.stockCostOverride != null ? String(record.stockCostOverride) : '');
    setEditingRevenue(false);
    setEditingStock(false);
  }, [weekKey, record.revenue, record.stockCostOverride]);

  // Labour cost — auto from roster
  const weekDates = dates.map(fmtDs);
  const labourCost = workers.docs.reduce((total, w) => {
    return total + weekDates.reduce((s, date) => {
      const sh = shifts.docs.find(x=>x.workerId===w.id&&x.date===date);
      return s + (sh ? hw(sh.start,sh.end)*(w.rate||0) : 0);
    }, 0);
  }, 0);

  // Stock cost — auto-suggested from orders placed/received within this week
  const ordersThisWeek = orders.docs.filter(o => {
    if (!o.createdAt) return false;
    const d = new Date(o.createdAt);
    return d >= dates[0] && d < new Date(dates[6].getTime() + 86400000);
  });
  const suggestedStockCost = ordersThisWeek.reduce((s,o) => s + (o.total||0), 0);
  const actualStockCost = stockCost !== '' ? parseFloat(stockCost)||0 : suggestedStockCost;

  const rev = parseFloat(revenue) || 0;
  const totalCost = labourCost + actualStockCost;
  const profit = rev - totalCost;
  const margin = rev > 0 ? (profit / rev) * 100 : null;
  const labourPct = rev > 0 ? (labourCost / rev) * 100 : null;
  const stockPct = rev > 0 ? (actualStockCost / rev) * 100 : null;

  const saveRevenue = async () => {
    await weeklyPnl.set(weekKey, { weekStart: weekKey, revenue: parseFloat(revenue)||0 });
    setEditingRevenue(false);
  };
  const saveStock = async () => {
    await weeklyPnl.set(weekKey, { weekStart: weekKey, stockCostOverride: stockCost === '' ? null : parseFloat(stockCost)||0 });
    setEditingStock(false);
  };
  const resetStockToAuto = async () => {
    setStockCost('');
    await weeklyPnl.set(weekKey, { weekStart: weekKey, stockCostOverride: null });
    setEditingStock(false);
  };

  // History — last several weeks with revenue entered
  const history = weeklyPnl.docs.filter(w => w.revenue != null).sort((a,b)=>b.weekStart.localeCompare(a.weekStart)).slice(0,8);

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <button onClick={()=>setOff(o=>o-1)} style={SN}>← Prev</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontWeight:600,fontSize:14}}>{weekLabel}</div>
          {off===0&&<div style={{fontSize:10,color:'#C8873A',letterSpacing:1,textTransform:'uppercase',marginTop:2}}>This week</div>}
        </div>
        <button onClick={()=>setOff(o=>o+1)} style={SN}>Next →</button>
      </div>

      {/* Revenue input */}
      <div style={{...SC,padding:16,marginBottom:12}}>
        <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>Revenue this week</div>
        {!editingRevenue ? (
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:26,color:rev>0?'#3daa6e':'#444'}}>{rev>0?fmtMoney(rev):'Not entered'}</div>
            <button onClick={()=>setEditingRevenue(true)} style={{...SG,fontSize:12}}>{rev>0?'Edit':'Enter revenue'}</button>
          </div>
        ) : (
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <input type="number" autoFocus value={revenue} onChange={e=>setRevenue(e.target.value)} placeholder="0.00"
              style={{...SI,width:140,fontSize:16,fontFamily:'DM Mono,monospace',fontWeight:700,color:'#3daa6e'}}
              onKeyDown={e=>e.key==='Enter'&&saveRevenue()}/>
            <button onClick={saveRevenue} style={{...SB,fontSize:12}}>Save</button>
            <button onClick={()=>setEditingRevenue(false)} style={{...SG,fontSize:12}}>Cancel</button>
          </div>
        )}
      </div>

      {/* Cost breakdown */}
      <div style={{...SC,padding:16,marginBottom:12}}>
        <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.8,marginBottom:12}}>Costs</div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #1a1a1a'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>Labour</div>
            <div style={{fontSize:11,color:'#555'}}>auto from roster{labourPct!=null?' · '+labourPct.toFixed(1)+'% of revenue':''}</div>
          </div>
          <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:'#7C9E6F'}}>{fmtMoney(labourCost)}</div>
        </div>

        <div style={{padding:'8px 0',borderBottom:'1px solid #1a1a1a'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>Stock / supplies</div>
              <div style={{fontSize:11,color:'#555'}}>
                {stockCost!==''?'manually set':'auto from '+ordersThisWeek.length+' order'+(ordersThisWeek.length!==1?'s':'')+' this week'}
                {stockPct!=null?' · '+stockPct.toFixed(1)+'% of revenue':''}
              </div>
            </div>
            {!editingStock ? (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:'#5B8FBF'}}>{fmtMoney(actualStockCost)}</div>
                <button onClick={()=>setEditingStock(true)} style={{...SG,fontSize:11,padding:'4px 8px'}}>Edit</button>
              </div>
            ) : null}
          </div>
          {editingStock&&(
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginTop:8}}>
              <input type="number" autoFocus value={stockCost} onChange={e=>setStockCost(e.target.value)} placeholder={suggestedStockCost.toFixed(2)}
                style={{...SI,width:120,fontSize:13,fontFamily:'DM Mono,monospace'}}/>
              <button onClick={saveStock} style={{...SB,fontSize:12,padding:'6px 12px'}}>Save</button>
              <button onClick={resetStockToAuto} style={{...SG,fontSize:12}}>Use auto (${suggestedStockCost.toFixed(2)})</button>
              <button onClick={()=>setEditingStock(false)} style={{...SG,fontSize:12}}>Cancel</button>
            </div>
          )}
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0 0'}}>
          <div style={{fontWeight:700,fontSize:13}}>Total cost</div>
          <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#C8873A'}}>{fmtMoney(totalCost)}</div>
        </div>
      </div>

      {/* Profit summary */}
      <div style={{background: rev===0?'#161616':(profit>=0?'#0d1a0d':'#1e0a0a'), border:'1px solid '+(rev===0?'#222':(profit>=0?'#2a4a2a':'#4a1a1a')), borderRadius:10, padding:18, marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.8,marginBottom:4}}>{profit>=0?'Profit':'Loss'} this week</div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:28,color:rev===0?'#444':(profit>=0?'#3daa6e':'#cc3222')}}>
              {rev===0?'—':(profit>=0?fmtMoney(profit):'-'+fmtMoney(Math.abs(profit)))}
            </div>
          </div>
          {margin!=null&&(
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.8,marginBottom:4}}>Margin</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:20,color:profit>=0?'#3daa6e':'#cc3222'}}>{margin.toFixed(1)}%</div>
            </div>
          )}
        </div>
      </div>

      {/* History */}
      {history.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#555',marginBottom:10}}>Recent weeks</div>
          <HistoryRows history={history} workers={workers} shifts={shifts} orders={orders}/>
        </div>
      )}
    </div>
  );
}

function HistoryRows({ history, workers, shifts, orders }) {
  return (
    <>
      {history.map(h => {
        const weekStart = new Date(h.weekStart + 'T00:00:00');
        const wDates = Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return fmtDs(d);});
        const labour = workers.docs.reduce((total,w)=>total+wDates.reduce((s,date)=>{
          const sh = shifts.docs.find(x=>x.workerId===w.id&&x.date===date);
          return s+(sh?hw(sh.start,sh.end)*(w.rate||0):0);
        },0),0);
        const weekEnd = new Date(weekStart.getTime()+6*86400000+86400000);
        const ordersInWeek = orders.docs.filter(o=>{
          if(!o.createdAt) return false;
          const d = new Date(o.createdAt);
          return d>=weekStart && d<weekEnd;
        });
        const suggestedStock = ordersInWeek.reduce((s,o)=>s+(o.total||0),0);
        const stock = h.stockCostOverride != null ? h.stockCostOverride : suggestedStock;
        const cost = labour + stock;
        const profit = (h.revenue||0) - cost;
        return (
          <div key={h.id} style={{...SC,padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{weekStart.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – {new Date(weekStart.getTime()+6*86400000).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
              <div style={{fontSize:11,color:'#555'}}>Rev {fmtMoney(h.revenue)} · Labour {fmtMoney(labour)} · Stock {fmtMoney(stock)}</div>
            </div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:profit>=0?'#3daa6e':'#cc3222'}}>
              {profit>=0?fmtMoney(profit):'-'+fmtMoney(Math.abs(profit))}
            </div>
          </div>
        );
      })}
    </>
  );
}

// Dashboard
function DashboardTab({ workers, shifts, suppliers, orders }) {
  const today = todayStr();
  const weekDates = getWeekDates(0).map(fmtDs);

  // Labour cost this week
  const weekLabour = workers.docs.reduce((total, w) => {
    return total + weekDates.reduce((s, date) => {
      const sh = shifts.docs.find(x=>x.workerId===w.id&&x.date===date);
      return s + (sh ? hw(sh.start,sh.end)*(w.rate||0) : 0);
    }, 0);
  }, 0);

  // Total owed
  const totalOwed = workers.docs.reduce((s,w)=>s+getPayInfo(w,shifts.docs).accruedPay,0);

  // Who needs paying (overdue or due today/tomorrow)
  const payAlerts = workers.docs.map(w=>({w, ...getPayInfo(w,shifts.docs)}))
    .filter(x=>x.daysUntil!=null&&x.daysUntil<=2 || (x.daysSince!=null&&x.daysSince>14))
    .sort((a,b)=>(a.daysUntil||99)-(b.daysUntil||99));

  // Low stock
  const lowStock = suppliers.docs.flatMap(s=>(s.items||[]).filter(i=>i.currentStock<=i.lowStock&&i.lowStock>0).map(i=>({...i,sn:s.name})));

  // Supplier order reminders
  const orderReminders = suppliers.docs.filter(s=>{
    if (!s.orderEvery) return false;
    if (!s.lastOrderDate) return true;
    return daysBetween(s.lastOrderDate, today) >= s.orderEvery;
  });

  // Pending orders
  const pendingOrders = orders.docs.filter(o=>o.status==='draft'||o.status==='sent');

  const hasAlerts = payAlerts.length>0||lowStock.length>0||orderReminders.length>0||pendingOrders.length>0;

  return (
    <div>
      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:20}}>
        {[
          {label:'Total owed',val:fmtMoney(totalOwed),color:'#C8873A'},
          {label:'Week labour',val:fmtMoney(weekLabour),color:'#7C9E6F'},
          {label:'Staff',val:workers.docs.length,color:'#5B8FBF'},
          {label:'Pending orders',val:pendingOrders.length,color:pendingOrders.length>0?'#C8873A':'#555'},
        ].map(k=>(
          <div key={k.label} style={{background:'#161616',border:'1px solid #222',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.8,marginBottom:6}}>{k.label}</div>
            <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:22,color:k.color}}>{k.val}</div>
          </div>
        ))}
      </div>

      {!hasAlerts&&(
        <div style={{background:'#0d1a0d',border:'1px solid #2a4a2a',borderRadius:10,padding:16,textAlign:'center',color:'#3daa6e',fontSize:13,fontWeight:600}}>
          ✓ All good — nothing needs attention
        </div>
      )}

      {/* Pay alerts */}
      {payAlerts.length>0&&(
        <div style={{...SC,marginBottom:12}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid #1e1e1e',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#C8873A'}}>Pay due</div>
          {payAlerts.map(({w,daysUntil,daysSince,accruedPay})=>(

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Roster
const DSHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function RosterTab({ workers, shifts, templates }) {
  const [off, setOff] = useState(0);
  const [copying, setCopying] = useState(false);
  const [copyTarget, setCopyTarget] = useState(1);
  const [copyStatus, setCopyStatus] = useState(null);
  const dates = getWeekDates(off);
  const getShift = (wid, date) => shifts.docs.find(s=>s.workerId===wid&&s.date===date)||null;
  const setShift = async (wid, date, val) => {
    const id = wid+'_'+date;
    if (val) await shifts.set(id, {workerId:wid,date,...val});
    else await shifts.remove(id);
  };
  const weekLabourCost = dates.reduce((total, d) => {
    return total + workers.docs.reduce((wTotal, w) => {
      const s = getShift(w.id, fmtDs(d));
      return wTotal + (s ? hw(s.start, s.end) * (w.rate||0) : 0);
    }, 0);
  }, 0);

  const copyWeek = async () => {
    setCopyStatus('copying');
    const srcDates = getWeekDates(off).map(fmtDs);
    const dstDates = getWeekDates(off + copyTarget).map(fmtDs);
    let copied = 0;
    for (const w of workers.docs) {
      for (let i = 0; i < 7; i++) {
        const src = getShift(w.id, srcDates[i]);
        if (!src) continue;
        const dstDate = dstDates[i];
        const existing = getShift(w.id, dstDate);
        if (existing) continue; // don't overwrite
        await shifts.set(w.id+'_'+dstDate, {workerId:w.id, date:dstDate, start:src.start, end:src.end});
        copied++;
      }
    }
    setCopyStatus('done:'+copied);
    setTimeout(() => { setCopying(false); setCopyStatus(null); }, 2000);
  };

  const targetLabel = copyTarget === 1 ? 'Next week' : copyTarget === -1 ? 'Prev week' : copyTarget > 0 ? `+${copyTarget} weeks` : `${copyTarget} weeks`;

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <button onClick={()=>setOff(o=>o-1)} style={SN}>← Prev</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontWeight:600,fontSize:14}}>{dates[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – {dates[6].toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
          {off===0&&<div style={{fontSize:10,color:'#C8873A',letterSpacing:1,textTransform:'uppercase',marginTop:2}}>This week</div>}
        </div>
        <button onClick={()=>setOff(o=>o+1)} style={SN}>Next →</button>
      </div>

      {/* Copy week bar */}
      {!copying ? (
        <div style={{marginBottom:16,textAlign:'right'}}>
          <button onClick={()=>{setCopying(true);setCopyTarget(1);}} style={{...SG,fontSize:12,color:'#C8873A',borderColor:'#3a2a10'}}>Copy this week →</button>
        </div>
      ) : (
        <div style={{background:'#161616',border:'1px solid #222',borderRadius:8,padding:'10px 14px',marginBottom:16,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'#888'}}>Copy shifts to:</span>
          <select value={copyTarget} onChange={e=>setCopyTarget(parseInt(e.target.value))} style={{...SI,width:'auto',fontSize:12,padding:'4px 8px',background:'#111',border:'1px solid #222',color:'#f0ebe4'}}>
            {[-4,-3,-2,-1,1,2,3,4].map(n=><option key={n} value={n}>{n>0?`+${n} week${n>1?'s':''}`:`${n} week${n<-1?'s':''}`} ({getWeekDates(off+n)[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})})</option>)}
          </select>
          {copyStatus==='copying' ? (
            <span style={{fontSize:12,color:'#666'}}>Copying...</span>
          ) : copyStatus && copyStatus.startsWith('done:') ? (
            <span style={{fontSize:12,color:'#3daa6e'}}>✓ {copyStatus.split(':')[1]} shifts copied</span>
          ) : (
            <>
              <button onClick={copyWeek} style={{...SB,fontSize:12,padding:'6px 14px'}}>Copy</button>
              <button onClick={()=>setCopying(false)} style={{...SG,fontSize:12}}>Cancel</button>
            </>
          )}
        </div>
      )}
      {workers.docs.length===0?<Empty msg="Add workers first"/>:(
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:560}}>
            <thead>
              <tr>
                <th style={{padding:'8px',textAlign:'left',color:'#444',fontWeight:500,fontSize:10,letterSpacing:0.8,textTransform:'uppercase',borderBottom:'1px solid #222'}}>Staff</th>
                {dates.map((d,i)=>(
                  <th key={i} style={{padding:'8px 3px',textAlign:'center',borderBottom:'1px solid #222'}}>
                    <div style={{fontSize:10,color:isToday(d)?'#C8873A':'#444',letterSpacing:0.5,textTransform:'uppercase'}}>{DSHORT[i]}</div>
                    <div style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:isToday(d)?700:400,color:isToday(d)?'#C8873A':'#777'}}>{d.getDate()}</div>
                  </th>
                ))}
                <th style={{padding:'8px 3px',textAlign:'center',color:'#444',fontWeight:500,fontSize:10,letterSpacing:0.8,textTransform:'uppercase',borderBottom:'1px solid #222'}}>Hrs</th>
              </tr>
            </thead>
            <tbody>
              {workers.docs.map(w=>{
                const wkH=dates.reduce((sum,d)=>{const s=getShift(w.id,fmtDs(d));return sum+(s?hw(s.start,s.end):0);},0);
                return (
                  <tr key={w.id}>
                    <td style={{padding:'6px 8px',borderBottom:'1px solid #1a1a1a'}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <div style={{width:7,height:7,borderRadius:'50%',background:w.color,flexShrink:0}}/>
                        <div>
                          <div style={{fontWeight:600,fontSize:12}}>{w.name}</div>
                          <div style={{fontSize:10,color:'#444',fontFamily:'DM Mono,monospace'}}>${w.rate}/hr</div>
                        </div>
                      </div>
                    </td>
                    {dates.map((d,i)=>{
                      const ds=fmtDs(d), sh=getShift(w.id,ds);
                      return <td key={i} style={{padding:'3px 2px',borderBottom:'1px solid #1a1a1a',background:isToday(d)?'#130f0d':'transparent'}}><ShiftCell shift={sh} color={w.color} onChange={v=>setShift(w.id,ds,v)} templateDocs={templates.docs}/></td>;
                    })}
                    <td style={{textAlign:'center',fontFamily:'DM Mono,monospace',fontWeight:600,color:wkH>0?'#C8873A':'#2a2a2a',fontSize:13,borderBottom:'1px solid #1a1a1a'}}>{wkH>0?wkH.toFixed(1):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {/* Labour cost footer */}
          <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:10,marginTop:10,paddingTop:10,borderTop:'1px solid #1e1e1e'}}>
            <span style={{fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:0.5}}>Week labour cost</span>
            <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#C8873A'}}>{fmtMoney(weekLabourCost)}</span>
          </div>
        </div>
      )}

      {/* Shift templates panel */}
      <div style={{marginTop:20,borderTop:'1px solid #1e1e1e',paddingTop:16}}>
        <TemplatesPanel templates={templates}/>
      </div>
    </div>
  );
}

// Pay card
function PayCard({ worker, allShifts, onPaid }) {
  const [marking, setMarking] = useState(false);
  const [editingLast, setEditingLast] = useState(false);
  const [payDate, setPayDate] = useState(todayStr());
  const [customPay, setCustomPay] = useState('');
  const [editLastAmt, setEditLastAmt] = useState('');
  const { lastPaid, lastAmount, daysSince, daysUntil, nextPayDate, accruedHours, accruedPay } = getPayInfo(worker, allShifts);
  const burnPct = daysUntil!=null ? Math.max(0,Math.min(100,((14-daysUntil)/14)*100)) : 0;
  const urgColor = daysUntil===0?'#cc3222':daysUntil!=null&&daysUntil<=3?'#e07030':'#C8873A';
  const finalPay = customPay !== '' ? parseFloat(customPay)||0 : accruedPay;

  const markPaid = async () => {
    const historyEntry = { date: payDate, amount: finalPay, hours: accruedHours, ts: Date.now() };
    const existing = worker.payHistory || [];
    await onPaid(worker.id, {
      lastPaidDate: payDate,
      lastPaidAmount: finalPay,
      lastPaidHours: accruedHours,
      payHistory: [...existing, historyEntry]
    });
    setMarking(false); setCustomPay('');
  };

  const saveLastAmt = async () => {
    const amt = parseFloat(editLastAmt);
    if (!isNaN(amt)) await onPaid(worker.id, { lastPaidAmount: amt });
    setEditingLast(false);
  };

  return (
    <div style={SC}>
      <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid #1e1e1e'}}>
        <div style={{width:9,height:9,borderRadius:'50%',background:worker.color,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>{worker.name}</div>
          <div style={{fontSize:11,color:'#555'}}>{worker.role} · ${worker.rate}/hr · Grp {worker.payGroup||'A'}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:22,color:'#C8873A',lineHeight:1}}>{fmtMoney(accruedPay)}</div>
          <div style={{fontSize:10,color:'#555',marginTop:2}}>{accruedHours}h since last pay</div>
        </div>
      </div>

      {lastPaid&&(
        <div style={{padding:'10px 16px',borderBottom:'1px solid #1e1e1e'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:10,color:'#444',textTransform:'uppercase',letterSpacing:0.5}}>Fortnight</span>
            <span style={{fontSize:10,fontFamily:'DM Mono,monospace',color:urgColor,fontWeight:600}}>
              {daysUntil===0?'PAY TODAY':daysUntil===1?'PAY TOMORROW':daysUntil+'d until pay'}
            </span>
          </div>
          <div style={{height:3,background:'#1e1e1e',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:burnPct+'%',background:'linear-gradient(90deg,#5a3010,'+urgColor+')',borderRadius:2}}/>
          </div>
        </div>
      )}

      <div style={{padding:'12px 16px',display:'flex',gap:20,flexWrap:'wrap',borderBottom:'1px solid #1e1e1e'}}>
        <Kpi label="Last paid" val={lastPaid?fmtDate(lastPaid):'Never'}/>
        <div>
          <div style={{fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:0.5,marginBottom:2}}>Last amount</div>
          {editingLast?(
            <div style={{display:'flex',gap:5,alignItems:'center'}}>
              <input type="number" value={editLastAmt} onChange={e=>setEditLastAmt(e.target.value)}
                style={{...SI,width:90,padding:'3px 6px',fontSize:12,fontFamily:'DM Mono,monospace'}}
                autoFocus onKeyDown={e=>e.key==='Enter'&&saveLastAmt()}/>
              <button onClick={saveLastAmt} style={{background:'#C8873A',border:'none',color:'#fff',borderRadius:4,padding:'3px 8px',cursor:'pointer',fontSize:11,fontWeight:700}}>✓</button>
              <button onClick={()=>setEditingLast(false)} style={{background:'#1e1e1e',border:'none',color:'#666',borderRadius:4,padding:'3px 6px',cursor:'pointer',fontSize:11}}>✕</button>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:600,fontSize:13}}>{lastAmount?fmtMoney(lastAmount):'—'}</div>
              <button onClick={()=>{setEditLastAmt(lastAmount||'');setEditingLast(true);}} style={{background:'transparent',border:'none',color:'#444',cursor:'pointer',fontSize:10,padding:'0 2px'}}>✏️</button>
            </div>
          )}
        </div>
        <Kpi label="Days since paid" val={daysSince!=null?daysSince+'d':'—'} warn={daysSince!=null&&daysSince>16}/>
        <Kpi label="Next pay date" val={nextPayDate?fmtDate(nextPayDate):'—'}/>
      </div>

      {/* Pay history */}
      {(worker.payHistory||[]).length>0&&(
        <details style={{borderTop:'1px solid #1a1a1a'}}>
          <summary style={{padding:'8px 16px',fontSize:11,color:'#555',cursor:'pointer',listStyle:'none',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Pay history ({(worker.payHistory||[]).length})</span>
            <span style={{color:'#333'}}>▾</span>
          </summary>
          <div style={{padding:'0 16px 10px'}}>
            {[...(worker.payHistory||[])].reverse().map((h,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #1a1a1a',fontSize:12}}>
                <span style={{color:'#888'}}>{fmtDate(h.date)}</span>
                <span style={{color:'#666'}}>{h.hours}h</span>
                <span style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'#C8873A'}}>{fmtMoney(h.amount)}</span>
              </div>
            ))}
          </div>
        </details>
      )}

      {!marking?(
        <div style={{padding:'10px 16px'}}>
          <button onClick={()=>{setMarking(true);setCustomPay('');}} style={{...SB,background:accruedPay>0?'#C8873A':'#1e1e1e',color:accruedPay>0?'#fff':'#444',fontSize:12,padding:'7px 14px'}}>
            {accruedPay>0?'Mark paid · '+fmtMoney(accruedPay):'Mark paid'}
          </button>
        </div>
      ):(
        <div style={{padding:'12px 16px',background:'#111',borderTop:'1px solid #1e1e1e'}}>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:8}}>
            <span style={{fontSize:12,color:'#666'}}>Pay date:</span>
            <input type="date" value={payDate} onChange={e=>setPayDate(e.target.value)} style={{...SI,width:'auto',fontSize:12,padding:'5px 8px'}}/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
            <span style={{fontSize:12,color:'#666'}}>Amount:</span>
            <input type="number" value={customPay!==''?customPay:accruedPay}
              onChange={e=>setCustomPay(e.target.value)}
              style={{...SI,width:110,fontSize:13,padding:'5px 8px',fontFamily:'DM Mono,monospace',color:'#C8873A',fontWeight:600}}/>
            {customPay!==''&&customPay!=accruedPay&&(
              <span style={{fontSize:11,color:'#555'}}>auto was {fmtMoney(accruedPay)}</span>
            )}
            {customPay!==''&&<button onClick={()=>setCustomPay('')} style={{background:'transparent',border:'none',color:'#555',cursor:'pointer',fontSize:11}}>reset</button>}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={markPaid} style={{...SB,fontSize:12,padding:'6px 14px'}}>Confirm {fmtMoney(finalPay)}</button>
            <button onClick={()=>{setMarking(false);setCustomPay('');}} style={{...SG,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}
